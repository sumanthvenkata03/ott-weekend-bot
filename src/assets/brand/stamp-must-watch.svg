<!-- 5 stamp variants for verdict overlays. Each renders as a tilted rectangular stamp -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" role="img" aria-label="MUST WATCH stamp">
  <g transform="translate(200 60) rotate(-6)">
    <rect x="-180" y="-44" width="360" height="88" fill="#A33223"/>
    <rect x="-176" y="-40" width="352" height="80" fill="none" stroke="#F4ECDC" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="12" fill="#F4ECDC" letter-spacing="6">★ THE VERDICT ★</text>
    <text x="0" y="28" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="36" font-weight="700" fill="#F4ECDC" letter-spacing="6">MUST WATCH</text>
  </g>
</svg>
