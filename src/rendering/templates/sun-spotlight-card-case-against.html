<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800;1,400;1,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1614;
    --cream: #F4ECDC;
    --vermillion: #A33223;
    --brass: #C49A3F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Playfair Display', Georgia, serif;
    background: var(--cream);
    color: var(--ink);
  }
  .canvas { position: relative; width: 100%; height: 100%; }

  /* Top strip */
  .strip-eyebrow {
    position: absolute;
    top: 65px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--brass);
    text-transform: uppercase;
  }
  .strip-rule {
    position: absolute;
    top: 100px;
    left: 80px;
    right: 80px;
    height: 1px;
    background: var(--brass);
  }

  /* Decorative curly quotes — brass, 180px, 0.8 opacity */
  .quote-open {
    position: absolute;
    top: 200px;
    left: 100px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 180px;
    line-height: 1;
    color: var(--brass);
    opacity: 0.8;
  }
  .quote-close {
    position: absolute;
    top: 720px;
    right: 100px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 180px;
    line-height: 1;
    color: var(--brass);
    opacity: 0.8;
  }

  /* Body text — Playfair regular, centered, max-width 850px */
  .body-text {
    position: absolute;
    top: 380px;
    left: 50%;
    transform: translateX(-50%);
    width: 850px;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 38px;
    line-height: 1.4;
    color: var(--ink);
    opacity: 0.95;
  }

  /* CTA block */
  .cta-rule {
    position: absolute;
    top: 925px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 0.5px;
    background: var(--brass);
  }
  .cta-line {
    position: absolute;
    top: 960px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--ink);
    opacity: 0.7;
  }

  /* Footer */
  .footer-left {
    position: absolute;
    bottom: 30px;
    left: 40px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--ink);
    opacity: 0.55;
  }
  .footer-right {
    position: absolute;
    bottom: 30px;
    right: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    opacity: 0.55;
  }
</style>
</head>
<body>
<div class="canvas">

  <div class="strip-eyebrow">★ SUN SPOTLIGHT · ON SKEPTICISM · 2 / 2 ★</div>
  <div class="strip-rule"></div>

  <div class="quote-open">&ldquo;</div>
  <div class="body-text">{{ caseAgainstSkepticism }}</div>
  <div class="quote-close">&rdquo;</div>

  <div class="cta-rule"></div>
  <div class="cta-line">@thebigscreenindex · {{ ctaTagline }}</div>

  <div class="footer-left">★ THE BIG SCREEN INDEX ★</div>
  <div class="footer-right">VOL. 01 · ISSUE {{ issueNumber }}</div>

</div>
</body>
</html>
