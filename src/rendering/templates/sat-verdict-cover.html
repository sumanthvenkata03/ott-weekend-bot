<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1614;
    --cream: #F4ECDC;
    --vermillion: #A33223;
    --brass: #C49A3F;
    --bottle: #2E5742;
    --oxblood: #682D25;
    --maroon: #581F16;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Playfair Display', Georgia, serif;
    background: var(--ink);
    color: var(--cream);
  }
  .canvas { position: relative; width: 100%; height: 100%; overflow: hidden; }

  /* ── Verdict Grid: a poster wall of every verdict film, filling the 4:5 frame.
     Rows are pre-split by the renderer (e.g. 2 / 3 / 2 for 7). ── */
  .grid {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }
  .row { display: flex; flex: 1 1 0; min-height: 0; }
  .tile {
    position: relative;
    flex: 1 1 0;
    min-width: 0;
    overflow: hidden;
    border: 7px solid var(--cream);
    background-color: var(--ink);
  }
  /* Verdict-color borders (mapped from each film's actual verdict).
     Thick (7px) + bright so each ruling reads at a glance. */
  .tile.skip      { border-color: var(--vermillion); }  /* SKIP */
  .tile.mustwatch { border-color: var(--bottle);     }  /* MUST WATCH (green) */
  .tile.onetime   { border-color: var(--brass);      }  /* ONE-TIME WATCH — brass border */
  .tile.try       { border-color: var(--cream);      }  /* WORTH A TRY — light border, reads on the scrim */

  .tile-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 22%;
    z-index: 2;
  }
  .tile-fallback {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 18px;
    color: var(--cream);
  }
  .tile-fallback .lang {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 10px;
  }
  .tile-fallback .title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.02;
  }

  /* ── Top scrim: LIGHT + short so the two top posters stay recognizable.
     Legibility for the title/legend comes from text-shadow + the chips' own
     pill backgrounds, not from darkening the whole top row. ── */
  .top-scrim {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 300px;
    z-index: 5;
    background: linear-gradient(to bottom,
      rgba(20, 16, 14, 0.72) 0%,
      rgba(20, 16, 14, 0.40) 48%,
      rgba(20, 16, 14, 0.0) 100%);
    pointer-events: none;
  }

  /* Tiny brand mark (masthead shrunk to a mark) — top-left */
  .mark {
    position: absolute;
    top: 46px;
    left: 56px;
    z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--brass);
    text-shadow: 0 2px 6px rgba(20, 16, 14, 0.9);
  }

  /* Hero title — bold + prominent, cleared left of the top-right poster's key art */
  .title {
    position: absolute;
    top: 34px;
    right: 300px;
    z-index: 10;
    width: 640px;
    text-align: right;
  }
  .title .kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.34em;
    color: var(--brass);
    text-transform: uppercase;
    margin-bottom: 14px;
    text-shadow: 0 2px 6px rgba(20, 16, 14, 0.9);
  }
  .title .line {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 58px;
    line-height: 0.94;
    letter-spacing: 1px;
    color: var(--cream);
    text-transform: uppercase;
    text-shadow:
      0 2px 5px rgba(20, 16, 14, 0.98),
      0 4px 14px rgba(20, 16, 14, 0.95),
      0 10px 34px rgba(20, 16, 14, 0.85);
  }
  .title .rule {
    margin-top: 18px;
    margin-left: auto;
    width: 200px;
    height: 3px;
    background: var(--brass);
  }

  /* ── Verdict legend (key) — decodes the poster borders ── */
  .legend {
    position: absolute;
    top: 372px;
    left: 56px;
    right: 56px;
    z-index: 10;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 8px 14px;
    background: rgba(20, 16, 14, 0.62);
    border: 1px solid rgba(244, 236, 220, 0.16);
    border-radius: 999px;
  }
  .chip .dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    flex: 0 0 auto;
  }
  .chip .dot.skip      { background: var(--vermillion); }
  .chip .dot.mustwatch { background: var(--bottle); }
  .chip .dot.onetime   { background: var(--brass); }
  .chip .dot.try       { background: var(--cream); }
  .chip .lbl {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cream);
  }

  /* ── Bottom swipe cue ── */
  /* Scrim band: the cue now sits ~25% up from the bottom (clear space beneath it
     so it can't be clipped/covered in-feed), so the scrim is a soft horizontal
     band centered on the cue's new position rather than a bottom-edge gradient.
     Fades at both edges (no hard line) and, with the cue's own text-shadow, keeps
     "SWIPE FOR MORE" legible over ANY bottom-row posters. */
  .bottom-scrim {
    position: absolute;
    bottom: 288px; left: 0; right: 0;
    height: 150px;
    z-index: 5;
    background: linear-gradient(to top,
      rgba(20, 16, 14, 0.0) 0%,
      rgba(20, 16, 14, 0.68) 34%,
      rgba(20, 16, 14, 0.68) 66%,
      rgba(20, 16, 14, 0.0) 100%);
    pointer-events: none;
  }
  .swipe {
    position: absolute;
    bottom: 338px;
    left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .swipe .txt {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--cream);
    text-shadow: 0 2px 8px rgba(20, 16, 14, 0.95);
  }
  .swipe .chev {
    font-family: 'Inter', sans-serif;
    font-size: 30px;
    font-weight: 900;
    line-height: 1;
    color: var(--brass);
    text-shadow: 0 2px 8px rgba(20, 16, 14, 0.95);
  }
  .swipe .chev .c1 { opacity: 0.45; }
  .swipe .chev .c2 { opacity: 0.72; }
  .swipe .chev .c3 { opacity: 1.0; }
</style>
</head>
<body>
<div class="canvas">

  <!-- POSTER WALL — every verdict film, verdict-color borders, rows pre-split by the renderer -->
  <div class="grid">
    {% for row in gridRows %}
    <div class="row">
      {% for tile in row %}
      <div class="tile {{ tile.verdictClass }}" style="background-color: {{ tile.fallbackColor }};">
        {% if tile.posterUrl %}
          <img class="tile-img" src="{{ tile.posterUrl }}" alt="" onerror="this.style.display='none'" />
        {% endif %}
        <div class="tile-fallback">
          <div class="lang">{{ tile.language | upper }}</div>
          <div class="title">{{ tile.filmTitle }}</div>
        </div>
      </div>
      {% endfor %}
    </div>
    {% endfor %}
  </div>

  <!-- TOP SCRIM -->
  <div class="top-scrim"></div>

  <!-- TINY BRAND MARK -->
  <div class="mark">&#9733; TBSI</div>

  <!-- HERO TITLE -->
  <div class="title">
    <div class="kicker">&#9733; THE WEEK&#8217;S RULING</div>
    <div class="line">Saturday</div>
    <div class="line">Theatrical</div>
    <div class="line">Verdict</div>
    <div class="rule"></div>
  </div>

  <!-- VERDICT LEGEND -->
  <div class="legend">
    <span class="chip"><span class="dot mustwatch"></span><span class="lbl">Must Watch</span></span>
    <span class="chip"><span class="dot try"></span><span class="lbl">Worth a Try</span></span>
    <span class="chip"><span class="dot onetime"></span><span class="lbl">One-Time Watch</span></span>
    <span class="chip"><span class="dot skip"></span><span class="lbl">Skip</span></span>
  </div>

  <!-- BOTTOM SWIPE CUE -->
  <div class="bottom-scrim"></div>
  <div class="swipe">
    <span class="txt">Swipe for More</span>
    <span class="chev"><span class="c1">&#8250;</span><span class="c2">&#8250;</span><span class="c3">&#8594;</span></span>
  </div>

</div>
</body>
</html>
