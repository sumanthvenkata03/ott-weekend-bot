<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&family=JetBrains+Mono:wght@400;500;600;700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
{% include "_design-tokens.html" %}
<style>
  /* ── NEWS · JN SKIN (spec §2.1) — poster-led single announcement ───────────
     Authored at 1080×1350 CSS; the renderer's deviceScaleFactor:2 emits the
     2160×2700 asset. EVERY constant below is the builder's @2x value HALVED
     (build_nfa_carousel.py). The px comments name the source line.

     Editor's law, enforced structurally: GOLD is the numeral + accents ONLY.
     Body copy is cream. There is no gold body class in this file to misuse. */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1350px; overflow: hidden;
    background: var(--ink); color: var(--cream);
    font-family: 'Playfair Display', Georgia, serif;
  }
  :root { --gold: #F2D48A; --news-cream: #F4ECDC; }
  .canvas { position: relative; width: 100%; height: 100%; overflow: hidden; }

  /* ── GROUND: full-bleed poster, cover-cropped, darkened (nfa:47 dark=0.30–0.36).
       The poster is CONTENT at every edge — no background may show (§4.3). ── */
  .ground { position: absolute; inset: 0; z-index: 0; background: var(--ink); }
  .ground img {
    width: 100%; height: 100%; object-fit: cover;
    object-position: {{ cropPosition | default('center 30%') }};
  }
  /* Flat darken — the builder multiplies the array by `dark`. */
  .darken { position: absolute; inset: 0; z-index: 1; background: #000;
            opacity: {{ darken | default(0.66) }}; }
  /* Radial vignette — nfa:50 `1-0.28*clip(r2-0.35,0,1)/0.65`, floor 0.72. */
  .vignette {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse 62% 62% at 50% 50%,
      rgba(0,0,0,0) 0%, rgba(0,0,0,0) 46%, rgba(0,0,0,0.28) 100%);
  }
  /* Film grain — nfa:51 gaussian σ≈7.5. feTurbulence is the CSS-side analogue. */
  .grain { position: absolute; inset: 0; z-index: 3; opacity: 0.055;
           pointer-events: none; mix-blend-mode: overlay; }
  /* Bottom legibility scrim. The PIL builder leans on per-glyph offset shadows
     (nfa:79/89 α170–180) for the statement + footer; CSS blur-shadows are
     softer, and on a BRIGHT poster the cream statement washed out. This is the
     smallest honest correction: a gradient only under the bottom text zone. */
  .base-scrim {
    position: absolute; left: 0; right: 0; bottom: 0; height: 42%; z-index: 3;
    background: linear-gradient(180deg,
      rgba(0,0,0,0) 0%, rgba(0,0,0,0.30) 34%, rgba(0,0,0,0.62) 62%,
      rgba(0,0,0,0.84) 84%, rgba(0,0,0,0.88) 100%);
  }

  .stack { position: absolute; inset: 0; z-index: 4; display: flex;
           flex-direction: column; align-items: center; padding: 0 54px; }

  /* Halo: the CSS equivalent of the builder's offset dark ghost layer
     (nfa:69 α150 mono / nfa:79 α170 serif / nfa:89 α180 gold). */
  .halo   { text-shadow: 0 1px 9px rgba(0,0,0,0.72), 0 0 4px rgba(0,0,0,0.60); }
  .halo-s { text-shadow: 0 3px 12px rgba(0,0,0,0.78), 0 0 5px rgba(0,0,0,0.62); }
  .halo-g { text-shadow: 0 4px 16px rgba(0,0,0,0.80), 0 0 6px rgba(0,0,0,0.66); }

  /* ── HANDLE PILL — always top-center (§1 Logo). PNG when the brand asset
       exists; otherwise the canonical CSS pill (ruling R2). ── */
  .pill-wrap { margin-top: 36px; }                    /* nfa:58 y=72 @2x */
  .pill-img  { height: 50px; display: block; filter: drop-shadow(0 3px 10px rgba(0,0,0,0.55)); }
  .pill-css {
    display: inline-flex; align-items: center; gap: 7px;
    height: 50px; padding: 0 22px; border-radius: 25px;
    background: #682D25; color: #FFEDDF;
    font-family: 'Baloo 2', system-ui, sans-serif; font-weight: 800;
    font-size: 21px; letter-spacing: 0.2px; line-height: 1;
    box-shadow: 0 4px 14px rgba(0,0,0,0.45);
  }
  .pill-css .cam { font-size: 19px; }

  .eyebrow {                                          /* nfa:103 44px track 9 */
    margin-top: 40px; font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 600; letter-spacing: 4.5px;
    color: var(--news-cream); text-transform: uppercase;
    white-space: nowrap; text-align: center;
  }
  .title {                                            /* nfa:105 serif 148 w800 */
    margin-top: 34px; font-size: 74px; font-weight: 800; line-height: 1.04;
    color: var(--news-cream); text-align: center; max-width: 100%;
  }
  .numeral {                                          /* nfa:106 gold 560 w900 */
    /* line-height MUST be ≥1 here. At 0.86 the box is shorter than the glyphs,
       so the next element in the flex column rides UP into the numeral — the
       fact strip printed straight through "JULY 31" on the first render. The
       metrics gate passed it (nothing hit an edge); only looking at the PNG at
       native resolution caught it. Visibility ≠ non-overlap. */
    margin-top: 22px; font-size: 240px; font-weight: 900; line-height: 1;
    color: var(--gold); text-align: center; letter-spacing: -2px;
  }
  .facts {                                            /* nfa:108 36px track 6 */
    margin-top: 34px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 500; letter-spacing: 3px;
    color: var(--news-cream); text-align: center; line-height: 1.7;
    max-width: 100%;
  }
  .statement {                                        /* nfa:110 serif 62 w600 */
    position: absolute; left: 54px; right: 54px; bottom: 176px;
    font-size: 31px; font-weight: 600; line-height: 1.34;
    color: var(--news-cream); text-align: center;
  }
  .footer { position: absolute; left: 0; right: 0; bottom: 60px; text-align: center; }
  .rule {                                             /* nfa:96 y=2532 w=560 */
    width: 280px; height: 1px; background: var(--brass); opacity: 0.80;
    margin: 0 auto 18px; border: 0;
  }
  .credits {                                          /* nfa:97 30px track 6 */
    font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500;
    letter-spacing: 3px; color: var(--news-cream); text-transform: uppercase;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="ground">
    {% if posterUrl %}<img src="{{ posterUrl }}" alt="">{% endif %}
  </div>
  <div class="darken"></div>
  <div class="vignette"></div>
  <svg class="grain"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3"/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg>
  <div class="base-scrim"></div>

  <div class="stack">
    <div class="pill-wrap">
      {% if pillPng %}
        <img class="pill-img" src="{{ pillPng }}" alt="@thebigscreenindex">
      {% else %}
        <span class="pill-css"><span class="cam">🎬</span>@thebigscreenindex</span>
      {% endif %}
    </div>

    <div class="eyebrow halo" data-fit data-min="13">{{ eyebrow }}</div>
    <div class="title halo-s" data-fit-block data-min="40">{{ title }}</div>
    {% if numeral %}<div class="numeral halo-g" data-fit data-min="90">{{ numeral }}</div>{% endif %}
    {% if facts %}<div class="facts halo" data-fit-block data-min="12">{{ facts }}</div>{% endif %}
  </div>

  {% if statement %}<div class="statement halo-s" data-fit-block data-min="19">{{ statement }}</div>{% endif %}

  <div class="footer">
    <hr class="rule">
    <div class="credits halo" data-fit data-min="10">{{ footer }}</div>
  </div>
</div>

<script>
/* AUTOSHRINK LAW (§1 Type, spec line 38): "every text call takes maxw; loop
   px -= 1..2 until it fits. Nothing ever overflows."
   data-fit       → single line, must not exceed its own width (no wrapping).
   data-fit-block → may wrap, must not exceed its allotted height.
   Runs synchronously before the screenshot; Puppeteer waits for load. */
(function () {
  function fitLine(el) {
    var min = parseFloat(el.dataset.min || '10');
    var px = parseFloat(getComputedStyle(el).fontSize);
    while (el.scrollWidth > el.clientWidth && px > min) {
      px -= 1; el.style.fontSize = px + 'px';
    }
  }
  function fitBlock(el) {
    var min = parseFloat(el.dataset.min || '10');
    var px = parseFloat(getComputedStyle(el).fontSize);
    var maxH = el.dataset.maxh ? parseFloat(el.dataset.maxh) : el.clientHeight || 1e9;
    if (!el.dataset.maxh) {
      /* Height budget = what the element currently occupies at its natural
         size, capped so a long title can never push the stack off-canvas. */
      maxH = Math.min(el.scrollHeight, 430);
    }
    while ((el.scrollHeight > maxH || el.scrollWidth > el.clientWidth) && px > min) {
      px -= 1; el.style.fontSize = px + 'px';
    }
  }
  document.querySelectorAll('[data-fit]').forEach(fitLine);
  document.querySelectorAll('[data-fit-block]').forEach(fitBlock);
  document.documentElement.setAttribute('data-fit-done', '1');
})();
</script>
</body>
</html>
