<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800;1,400;1,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
{% include "_design-tokens.html" %}
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Playfair Display', Georgia, serif;
    background: var(--cream); color: var(--ink);
  }
  .canvas { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }

  .head { padding: 70px 64px 28px; text-align: center; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700;
    letter-spacing: 6px; color: var(--vermillion); text-transform: uppercase; margin-bottom: 22px;
  }
  .wordmark {
    font-family: 'Playfair Display', serif; font-weight: 800; font-size: 108px;
    line-height: 0.92; letter-spacing: -2px; color: var(--ink);
  }
  .wordmark .archives { color: var(--vermillion); }
  .rule { border-top: 3px solid var(--ink); margin: 30px 64px 0; }
  .subline {
    font-family: 'Playfair Display', serif; font-style: italic; font-size: 34px;
    color: var(--ink); opacity: 0.85; margin-top: 26px;
  }

  /* Poster mosaic */
  .mosaic { flex: 1; display: flex; gap: 14px; padding: 30px 48px 40px; align-items: stretch; }
  .tile {
    flex: 1; position: relative; overflow: hidden; border: 4px solid var(--vermillion);
    background: var(--ink);
  }
  .tile-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; }
  .tile-fallback {
    position: absolute; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center;
    color: var(--cream); font-family: 'Playfair Display', serif; font-size: 22px; letter-spacing: 4px; opacity: 0.85;
  }

  .foot {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 64px 54px;
    font-family: 'Playfair Display', serif; font-size: 18px; letter-spacing: 4px; color: var(--ink);
  }
  .foot .meta { font-family: 'JetBrains Mono', monospace; font-size: 18px; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="canvas">

  <div class="head">
    <div class="eyebrow">★ THE BIG SCREEN INDEX</div>
    <div class="wordmark">TBSI <span class="archives">ARCHIVES</span></div>
    <div class="rule"></div>
    <div class="subline">{{ filmCount }} films · {{ genreCount }} genres · all streaming tonight</div>
  </div>

  <div class="mosaic">
    {% for t in tiles %}
    <div class="tile">
      {% if t.posterUrl %}
        <img src="{{ t.posterUrl }}" class="tile-img" alt="" onerror="this.style.display='none'" />
      {% endif %}
      <div class="tile-fallback" style="background: {{ t.fallbackColor }};">{{ t.language }}</div>
    </div>
    {% endfor %}
  </div>

  <div class="foot">
    <span>ARCHIVE EDITION</span>
    <span class="meta">VOL. {{ vol }} · {{ issueDate }}</span>
  </div>

</div>
</body>
</html>
