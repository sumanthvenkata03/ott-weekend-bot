<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>TBSI · Watchlist</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1A1614" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#1A1614; --cream:#F4ECDC; --vermillion:#A33223; --brass:#C49A3F;
      --bottle:#2E5742; --green:#2E5742; --oxblood:#682D25; --maroon:#581F16;
      --warm-cream:#FFEDDF; --gold-light:#F2D48A;
      --cream-60:rgba(244,236,220,.60); --cream-30:rgba(244,236,220,.30); --cream-12:rgba(244,236,220,.12);
      --panel:#211a16; --field:#1b1510; --thumb:#2a211b; --down:#D98A7C;
      --paper:#1A1614; --line:rgba(244,236,220,.12); --ink-soft:rgba(244,236,220,.60);
      --serif:"Space Grotesk",system-ui,sans-serif; --sans:"Inter",system-ui,sans-serif;
      --mono:"IBM Plex Mono",ui-monospace,Consolas,monospace;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{background:var(--ink);color:var(--cream);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    ::selection{background:rgba(242,212,138,.28);color:var(--ink);}
    :focus-visible{outline:2px solid var(--gold-light);outline-offset:3px;}
    @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;} *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition:none!important;}}
    .wrap{max-width:1120px;margin:0 auto;padding:22px 22px 90px;}
    a{color:var(--brass);} a:hover{color:var(--gold-light);}
    .topbar{position:sticky;top:0;z-index:60;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:rgba(26,22,20,.88);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid var(--cream-12);padding:12px 0;margin-bottom:4px;}
    .back{font-family:var(--sans);font-size:13.5px;font-weight:500;letter-spacing:.01em;text-decoration:none;color:var(--cream-60);border:1px solid var(--cream-12);border-radius:100px;padding:7px 14px;cursor:pointer;transition:color .15s,border-color .15s;}
    .back:hover{color:var(--cream);border-color:var(--cream-30);}
    .brand{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-60);display:inline-flex;align-items:center;gap:8px;}
    .brand::before{content:"";width:10px;height:14px;background:var(--vermillion);border-radius:1px;flex:0 0 auto;}
    h1{font-family:var(--serif);font-weight:700;letter-spacing:-.02em;font-size:clamp(26px,5vw,40px);margin:18px 0 4px;color:var(--warm-cream);}
    .lede{font-family:var(--mono);font-size:11px;color:var(--cream-60);letter-spacing:.04em;margin-bottom:8px;}
    .banner{font-family:var(--mono);font-size:11px;color:var(--gold-light);background:rgba(196,154,63,.12);border:1px solid var(--brass);border-radius:12px;padding:10px 14px;margin:12px 0 4px;display:none;}
    .banner.on{display:block;}
    .banner b{color:var(--warm-cream);}
    .seclabel{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--brass);margin:28px 0 12px;border-bottom:1px solid var(--cream-12);padding-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
    .seclabel span:first-child{display:inline-flex;align-items:center;}
    .seclabel span:first-child::before{content:"";display:inline-block;width:22px;height:2px;background:var(--brass);margin-right:10px;flex:0 0 auto;}
    .seclabel .count{color:var(--cream-60);font-weight:400;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;}
    .card{border:1px solid var(--cream-12);background:var(--panel);border-radius:16px;overflow:hidden;position:relative;transition:transform .15s,border-color .15s;}
    .card:hover{transform:translateY(-6px);border-color:var(--cream-30);}
    .card a.open{text-decoration:none;color:inherit;display:block;}
    .card .p{aspect-ratio:2/3;background:var(--thumb) center/cover no-repeat;display:flex;align-items:center;justify-content:center;}
    .card .p.empty{font-family:var(--mono);font-size:10px;color:var(--cream-60);}
    .card .m{padding:10px 11px 12px;}
    .card .t{font-family:var(--serif);font-weight:600;letter-spacing:-.01em;font-size:15px;line-height:1.15;color:var(--cream);}
    .card .d{font-family:var(--mono);font-size:10px;color:var(--cream-60);margin-top:4px;}
    .card .rm{position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;color:var(--cream);background:var(--vermillion);border:none;border-radius:100px;padding:4px 10px;cursor:pointer;opacity:.94;}
    .card .rm:hover{background:var(--oxblood);}

    .spinner{width:16px;height:16px;border:2px solid var(--cream-12);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;flex:0 0 auto;box-sizing:border-box;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--cream-60);padding:14px 2px;}
    .msg{font-family:var(--mono);font-size:12px;color:var(--cream-60);padding:10px 2px;}
    .msg.err{color:var(--down);}
    /* Touch devices (phones/tablets): guarantee ~44px minimum tap targets.
       Scoped to pointer:coarse so the confirmed mouse/desktop layout is unchanged. */
    @media (pointer:coarse){
      .back,.savebtn,.tab,.fbtn,.nav a,.rawbar button,.chosen .cx,.seeall{display:inline-flex;align-items:center;justify-content:center;min-height:44px;}
      .fsort{min-height:44px;}
      .crewrow{min-height:44px;}
      .rm{min-height:40px;display:inline-flex;align-items:center;}
      a.link{display:inline-block;padding:5px 0;}
      .feed .seclabel{align-items:center;}
      .lb a,.lb button{min-height:44px;}
      .lb .nav{min-width:44px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="/">← Search</a>
      <span class="brand">TBSI · Watchlist · Localhost</span>
    </div>
    <h1>Watchlist</h1>
    <div class="lede">A single shared list — films &amp; people you saved.</div>
    <div class="banner" id="banner">In-memory mode: this list is <b>not persisted</b> (no DATABASE_URL). Set a Render PostgreSQL to sync across devices &amp; survive redeploys.</div>
    <div id="content"><div class="loading"><span class="spinner"></span>Loading your watchlist…</div></div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    async function getJson(url, opts){ const r = await fetch(url, opts); const d = await r.json().catch(()=>({error:"bad JSON"})); if(!r.ok) throw new Error(d.error||("HTTP "+r.status)); return d; }
    const poster = (m) => m.posterUrl ? `<span class="p" style="background-image:url('${esc(m.posterUrl)}')"></span>` : `<span class="p empty">no image</span>`;

    async function load(){
      try{
        const d = await getJson("/api/watchlist");
        if(d.store !== "postgres") $("#banner").classList.add("on");
        render(d.items || []);
      }catch(e){ $("#content").innerHTML = `<div class="msg err">Couldn’t load watchlist: ${esc(e.message)}</div>`; }
    }

    function render(items){
      const films = items.filter(i=>i.type==="film");
      const people = items.filter(i=>i.type==="person");
      if(!items.length){ $("#content").innerHTML = `<div class="msg">Nothing saved yet. Open a film or person and tap <b>☆ Save</b>.</div>`; return; }
      const grid = (arr, href) => `<div class="grid">${arr.map(i=>`
        <div class="card" data-type="${i.type}" data-id="${i.tmdbId}">
          <a class="open" href="${href}${i.tmdbId}">${poster(i)}<div class="m"><div class="t">${esc(i.title)}</div><div class="d">${esc((i.addedAt||"").slice(0,10))}</div></div></a>
          <button class="rm" title="Remove">remove</button>
        </div>`).join("")}</div>`;
      $("#content").innerHTML =
        `<div class="seclabel"><span>Films</span><span class="count">${films.length}</span></div>${films.length?grid(films,"/movie.html?id="):`<div class="msg">No films saved.</div>`}
         <div class="seclabel"><span>People</span><span class="count">${people.length}</span></div>${people.length?grid(people,"/person.html?id="):`<div class="msg">No people saved.</div>`}`;
      $("#content").querySelectorAll(".rm").forEach(btn=>btn.addEventListener("click", async (e)=>{
        const card = e.target.closest(".card"); const type = card.dataset.type, id = card.dataset.id;
        btn.textContent = "…"; btn.disabled = true;
        try{ await getJson(`/api/watchlist/${type}/${id}`, { method:"DELETE" }); card.remove(); }
        catch(err){ btn.textContent = "remove"; btn.disabled = false; }
      }));
    }
    load();
  </script>
  <script>
    if ("serviceWorker" in navigator) window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
  </script>
</body>
</html>
