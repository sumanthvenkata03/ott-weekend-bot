<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>TBSI · Film Record</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1A1614" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TBSI Lookup" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#1A1614; --cream:#F4ECDC; --vermillion:#A33223; --brass:#C49A3F;
      --bottle:#2E5742; --green:#2E5742; --oxblood:#682D25; --maroon:#581F16;
      --warm-cream:#FFEDDF; --gold-light:#F2D48A;
      --cream-60:rgba(244,236,220,.60); --cream-30:rgba(244,236,220,.30); --cream-12:rgba(244,236,220,.12);
      --panel:#211a16; --field:#1b1510; --thumb:#2a211b; --down:#D98A7C;
      --paper:#1A1614; --line:rgba(244,236,220,.12); --ink-soft:rgba(244,236,220,.60);
      --serif:"Space Grotesk",system-ui,sans-serif; --sans:"Inter",system-ui,sans-serif;
      --mono:"IBM Plex Mono",ui-monospace,Consolas,monospace;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{background:var(--ink);color:var(--cream);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    ::selection{background:rgba(242,212,138,.28);color:var(--ink);}
    :focus-visible{outline:2px solid var(--gold-light);outline-offset:3px;}
    @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;} *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition:none!important;}}
    .wrap{max-width:1120px;margin:0 auto;padding:22px 22px 90px;}
    a{color:var(--brass);} a:hover{color:var(--gold-light);}
    .topbar{position:sticky;top:0;z-index:60;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:rgba(26,22,20,.88);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid var(--cream-12);padding:12px 0;margin-bottom:4px;}
    .back{font-family:var(--sans);font-size:13.5px;font-weight:500;letter-spacing:.01em;text-decoration:none;color:var(--cream-60);border:1px solid var(--cream-12);border-radius:100px;padding:7px 14px;cursor:pointer;transition:color .15s,border-color .15s;}
    .back:hover{color:var(--cream);border-color:var(--cream-30);}
    .brand{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-60);display:inline-flex;align-items:center;gap:8px;}
    .brand::before{content:"";width:10px;height:14px;background:var(--vermillion);border-radius:1px;flex:0 0 auto;}
    .status{text-align:center;font-family:var(--mono);font-size:12px;color:var(--cream-60);min-height:18px;margin:18px 0;}
    .status.err{color:var(--down);font-weight:500;}

    .seclabel{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--brass);margin:36px 0 16px;border-bottom:1px solid var(--cream-12);padding-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
    .seclabel span:first-child{display:inline-flex;align-items:center;}
    .seclabel span:first-child::before{content:"";display:inline-block;width:22px;height:2px;background:var(--brass);margin-right:10px;flex:0 0 auto;}
    .seclabel .count{color:var(--cream-60);font-weight:400;text-align:right;}

    .hero{display:grid;grid-template-columns:240px 1fr;gap:28px;margin-top:18px;}
    @media (max-width:640px){.hero{grid-template-columns:1fr;}}
    .hero .poster{width:100%;border:1px solid var(--cream-12);border-radius:16px;background:var(--thumb);display:block;}
    .hero h1{font-family:var(--serif);font-weight:700;letter-spacing:-.02em;font-size:clamp(28px,5vw,44px);line-height:1.02;margin:0 0 6px;color:var(--warm-cream);}
    .hero .orig{font-family:var(--sans);color:var(--cream-60);font-size:17px;margin-bottom:8px;}
    .hero .tagline{font-family:var(--sans);font-style:italic;color:var(--gold-light);font-size:16px;margin:8px 0;}
    .metaline{font-family:var(--mono);font-size:12px;letter-spacing:.05em;margin:8px 0 14px;color:var(--cream-60);}
    .metaline b{color:var(--brass);font-weight:500;}
    .savebtn{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.01em;padding:9px 18px;border-radius:100px;cursor:pointer;border:1px solid var(--brass);background:transparent;color:var(--gold-light);margin:0 0 12px;transition:background .15s,color .15s,border-color .15s;}
    .savebtn:hover{border-color:var(--gold-light);}
    .savebtn.on{background:var(--gold-light);color:var(--ink);border-color:var(--gold-light);}
    .savebtn:disabled{opacity:.6;cursor:default;}
    .fields{display:grid;grid-template-columns:repeat(2,1fr);gap:18px 26px;margin-top:8px;}
    @media (max-width:640px){.fields{grid-template-columns:1fr;}}
    .field.full{grid-column:1/-1;}
    .field .k{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--brass);margin-bottom:5px;}
    .field .v{font-size:15px;color:var(--cream);}
    .field .v.syn{font-family:var(--sans);font-size:15px;line-height:1.6;color:var(--cream);}
    .chips{display:flex;flex-wrap:wrap;gap:7px;}
    .chip{font-family:var(--mono);font-size:11px;padding:4px 11px;border:1px solid var(--cream-12);border-radius:100px;background:rgba(244,236,220,.04);color:var(--cream);}
    .chip.plat{border-color:rgba(46,87,66,.9);background:rgba(46,87,66,.35);color:#9CC7AF;font-weight:500;}
    .chip.score{border-color:var(--brass);background:rgba(196,154,63,.15);color:var(--gold-light);font-weight:500;}
    a.link{color:var(--brass);text-decoration:none;border-bottom:1px solid var(--cream-30);}
    a.link:hover{color:var(--gold-light);border-color:var(--gold-light);}
    .note{font-family:var(--mono);font-size:11px;color:var(--cream-60);line-height:1.5;border-left:2px solid var(--brass);padding:4px 0 4px 12px;margin-top:6px;}

    .people{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px;}
    .person{cursor:pointer;border:1px solid var(--cream-12);background:var(--panel);border-radius:16px;overflow:hidden;transition:transform .15s,border-color .15s;}
    .person:hover{transform:translateY(-6px);border-color:var(--cream-30);}
    .person .ph{aspect-ratio:2/3;background:var(--thumb) center/cover no-repeat;display:flex;align-items:center;justify-content:center;}
    .person .ph.empty{font-family:var(--mono);font-size:10px;color:var(--cream-60);text-align:center;padding:8px;}
    .person .pm{padding:9px 10px 11px;}
    .person .pn{font-family:var(--serif);font-weight:600;letter-spacing:-.01em;font-size:14px;line-height:1.15;color:var(--cream);}
    .person .pr{font-family:var(--mono);font-size:10px;color:var(--cream-60);margin-top:3px;}
    .crewgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px 18px;}
    .crewrow{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:7px 0;border-bottom:1px solid var(--cream-12);cursor:pointer;color:var(--cream);}
    .crewrow:hover .cn{color:var(--gold-light);}
    .crewrow .cn{font-weight:500;}
    .crewrow .cj{font-family:var(--mono);font-size:10px;color:var(--cream-60);text-align:right;text-transform:uppercase;letter-spacing:.05em;}

    .tabs{display:flex;gap:8px;margin:6px 0 14px;flex-wrap:wrap;}
    .tab{font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.01em;padding:8px 16px;border:1px solid var(--cream-12);background:transparent;color:var(--cream-60);cursor:pointer;border-radius:100px;transition:color .15s,border-color .15s,background .15s;}
    .tab:hover{color:var(--cream);border-color:var(--cream-30);}
    .tab.active{background:var(--gold-light);color:var(--ink);border-color:var(--gold-light);}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
    .grid.backdrops{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
    .gimg{position:relative;border:1px solid var(--cream-12);border-radius:16px;overflow:hidden;background:var(--thumb);cursor:pointer;transition:transform .15s,border-color .15s;}
    .gimg:hover{transform:translateY(-6px);border-color:var(--cream-30);}
    .gimg img{width:100%;display:block;}
    .gimg .tag{position:absolute;top:8px;left:8px;font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;background:rgba(26,22,20,.82);color:var(--cream);padding:3px 8px;border-radius:100px;}
    .gimg .src{position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;background:rgba(46,87,66,.9);color:var(--cream);padding:3px 8px;border-radius:100px;}
    .gimg .src.omdb{background:var(--brass);color:var(--ink);}
    .gimg .dim{position:absolute;bottom:8px;right:8px;font-family:var(--mono);font-size:9px;background:rgba(26,22,20,.82);color:var(--cream);padding:3px 8px;border-radius:100px;}

    .pcountry{border:1px solid var(--cream-12);border-radius:16px;background:var(--panel);padding:12px 16px;margin-bottom:12px;}
    .pcode{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--brass);margin-bottom:8px;}
    .prow{display:flex;gap:10px;align-items:flex-start;padding:5px 0;}
    .prow .pk{font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--cream-60);flex:0 0 70px;padding-top:5px;}
    .prow .pv{display:flex;flex-wrap:wrap;gap:7px;flex:1;}
    .pchip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;padding:4px 11px 4px 5px;border:1px solid rgba(46,87,66,.9);border-radius:100px;background:rgba(46,87,66,.28);color:#9CC7AF;font-weight:500;}
    .pchip img{width:18px;height:18px;border-radius:50%;}

    .vidgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
    .vid{display:flex;gap:10px;border:1px solid var(--cream-12);border-radius:16px;background:var(--panel);overflow:hidden;text-decoration:none;color:inherit;transition:transform .15s,border-color .15s;}
    .vid:hover{transform:translateY(-6px);border-color:var(--cream-30);}
    .vthumb{position:relative;flex:0 0 120px;aspect-ratio:16/9;background:var(--ink) center/cover no-repeat;display:flex;align-items:center;justify-content:center;}
    .vthumb .play{color:var(--cream);font-size:22px;text-shadow:0 2px 8px rgba(0,0,0,.6);}
    .vmeta{display:flex;flex-direction:column;justify-content:center;padding:8px 10px 8px 0;min-width:0;}
    .vname{font-family:var(--serif);font-weight:600;letter-spacing:-.01em;font-size:14px;line-height:1.2;color:var(--cream);}
    .vtype{font-family:var(--mono);font-size:10px;color:var(--cream-60);text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}

    .bgcard{display:grid;grid-template-columns:120px 1fr;gap:18px;border:1px solid var(--cream-12);border-radius:16px;background:var(--panel);padding:18px;}
    @media (max-width:560px){.bgcard{grid-template-columns:1fr;}}
    .bgthumb{width:100%;border:1px solid var(--cream-12);border-radius:10px;}
    .bgtitle{font-family:var(--serif);font-weight:700;letter-spacing:-.01em;font-size:19px;color:var(--warm-cream);}
    .bgdesc{font-family:var(--sans);font-style:italic;font-weight:400;font-size:14px;color:var(--cream-60);}
    .bgextract{font-family:var(--sans);font-size:14.5px;line-height:1.6;margin:8px 0 10px;color:var(--cream);}

    .spinner{width:16px;height:16px;border:2px solid var(--cream-12);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;flex:0 0 auto;box-sizing:border-box;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--cream-60);padding:14px 2px;}
    .loading.err{color:var(--down);}
    .skelcard{aspect-ratio:2/3;border-radius:16px;background:linear-gradient(100deg,#241d18 30%,#31281f 50%,#241d18 70%);background-size:200% 100%;animation:shimmer 1.2s ease-in-out infinite;}
    @keyframes shimmer{to{background-position:-200% 0;}}
    .wakebanner{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);display:flex;align-items:center;gap:10px;background:var(--panel);color:var(--cream);font-family:var(--mono);font-size:12px;letter-spacing:.03em;padding:12px 18px;border-radius:100px;border:1px solid var(--brass);box-shadow:0 12px 40px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:200;}
    .wakebanner.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .wakebanner::before{content:"";width:14px;height:14px;border:2px solid var(--cream-30);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;box-sizing:border-box;}

    details.raw{margin-top:12px;border:1px solid var(--cream-12);border-radius:16px;background:var(--panel);overflow:hidden;}
    details.raw summary{cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--brass);padding:14px 16px;user-select:none;}
    details.raw[open] summary{border-bottom:1px solid var(--cream-12);}
    details.raw pre{margin:0;padding:16px;overflow:auto;max-height:560px;font-family:var(--mono);font-size:11.5px;line-height:1.5;color:var(--cream-60);}
    .rawbar{display:flex;gap:10px;padding:10px 16px;border-top:1px solid var(--cream-12);}
    .rawbar button{font-family:var(--mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;padding:6px 14px;border:1px solid var(--cream-12);background:transparent;color:var(--cream);border-radius:100px;cursor:pointer;transition:border-color .15s;}
    .rawbar button:hover{border-color:var(--cream-30);}

    .lb{position:fixed;inset:0;background:rgba(16,12,10,.94);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:120;padding:24px;}
    .lb.open{display:flex;}
    .lb img{max-width:92vw;max-height:76vh;border:1px solid var(--cream-30);border-radius:8px;box-shadow:0 24px 70px rgba(0,0,0,.7);}
    .lb .bar{display:flex;gap:12px;margin-top:16px;align-items:center;flex-wrap:wrap;justify-content:center;}
    .lb a,.lb button{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.01em;padding:10px 18px;border-radius:100px;cursor:pointer;text-decoration:none;border:1px solid var(--cream-30);color:var(--cream);background:transparent;transition:background .15s,border-color .15s,color .15s;}
    .lb .dl{background:var(--gold-light);color:var(--ink);border-color:var(--gold-light);}
    .lb .dl:hover{background:var(--warm-cream);border-color:var(--warm-cream);}
    .lb .open2:hover{border-color:var(--cream);}
    .lb .close{background:var(--vermillion);color:var(--cream);border-color:var(--vermillion);}
    .lb .close:hover{background:var(--oxblood);border-color:var(--oxblood);}
    .lb .counter{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.1em;color:var(--cream-60);padding:10px 6px;border:none;background:none;}
    .lb .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:2;width:52px;height:74px;display:flex;align-items:center;justify-content:center;padding:0;font-family:var(--serif);font-size:34px;line-height:1;font-weight:600;background:rgba(26,22,20,.6);color:var(--cream);border:1px solid var(--cream-30);border-radius:100px;cursor:pointer;transition:background .15s,border-color .15s;}
    .lb .nav:hover{background:var(--panel);border-color:var(--gold-light);}
    .lb .nav.prev{left:18px;} .lb .nav.next{right:18px;}
    @media (max-width:640px){.lb .nav{width:44px;height:60px;font-size:28px;} .lb .nav.prev{left:6px;} .lb .nav.next{right:6px;}}
    .lb .cap{font-family:var(--mono);font-size:11px;color:var(--cream-60);margin-top:8px;}

    .modal{position:fixed;inset:0;background:rgba(16,12,10,.8);display:none;align-items:flex-start;justify-content:center;z-index:80;padding:34px 18px;overflow:auto;}
    .modal.open{display:flex;}
    .sheet{background:var(--panel);max-width:940px;width:100%;border:1px solid var(--cream-12);border-radius:16px;padding:22px 24px 30px;box-shadow:0 30px 90px rgba(0,0,0,.6);}
    .sheet .x{float:right;font-family:var(--sans);font-size:13px;font-weight:600;border:1px solid var(--vermillion);color:var(--cream);background:var(--vermillion);padding:7px 14px;border-radius:100px;cursor:pointer;}
    .phead{display:grid;grid-template-columns:130px 1fr;gap:20px;}
    @media (max-width:560px){.phead{grid-template-columns:1fr;}}
    .phead .ppic{width:100%;border:1px solid var(--cream-12);border-radius:12px;background:var(--thumb);}
    .phead h2{font-family:var(--serif);font-weight:700;letter-spacing:-.01em;font-size:26px;margin:0 0 4px;color:var(--warm-cream);}
    .phead .pmeta{font-family:var(--mono);font-size:11px;color:var(--cream-60);line-height:1.7;}
    .bio{font-family:var(--sans);font-size:14.5px;line-height:1.6;margin-top:12px;max-height:180px;overflow:auto;color:var(--cream);}
    .kf{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
    .kf a,.kf span{font-family:var(--mono);font-size:11px;padding:4px 10px;border:1px solid var(--cream-12);border-radius:100px;background:rgba(244,236,220,.04);text-decoration:none;color:var(--cream);}

    @media (max-width:520px){
      .wrap{padding:16px 14px 60px;}
      .brand{font-size:9px;letter-spacing:.14em;text-align:right;}
      .seclabel{margin:28px 0 14px;}
      .hero{gap:16px;}
      .hero .poster{max-width:190px;}
      .metaline{font-size:11px;}
      .tab{padding:10px 16px;}
      .grid{gap:10px;}
      .crewgrid{grid-template-columns:1fr;}
      .lb{padding:14px;}
      .lb img{max-width:94vw;max-height:64vh;}
      .lb .bar{gap:8px;margin-top:12px;}
      .lb a,.lb button{font-size:12px;padding:9px 14px;letter-spacing:.01em;}
      .lb .cap{font-size:10px;}
    }
    .hidden{display:none!important;}
    /* Touch devices (phones/tablets): guarantee ~44px minimum tap targets.
       Scoped to pointer:coarse so the confirmed mouse/desktop layout is unchanged. */
    @media (pointer:coarse){
      .back,.savebtn,.tab,.fbtn,.nav a,.rawbar button,.chosen .cx,.seeall{display:inline-flex;align-items:center;justify-content:center;min-height:44px;}
      .fsort{min-height:44px;}
      .crewrow{min-height:44px;}
      .rm{min-height:40px;display:inline-flex;align-items:center;}
      a.link{display:inline-block;padding:5px 0;}
      .feed .seclabel{align-items:center;}
      .lb a,.lb button{min-height:44px;}
      .lb .nav{min-width:44px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" id="back" href="/">← Search</a>
      <span class="brand">TBSI · Film Record · Localhost</span>
    </div>
    <div class="status" id="status">Loading…</div>
    <div id="body" class="hidden"></div>
  </div>

  <!-- shared lightbox -->
  <div class="lb" id="lb">
    <button class="nav prev" id="lbPrev" aria-label="Previous image">‹</button>
    <img id="lbImg" alt="" />
    <button class="nav next" id="lbNext" aria-label="Next image">›</button>
    <div class="bar">
      <span class="counter" id="lbCounter"></span>
      <a class="dl" id="lbDownload" href="#">Download full-res</a>
      <a class="open2" id="lbOpen" href="#" target="_blank" rel="noopener">Open original ↗</a>
      <button class="close" id="lbClose">Close ✕</button>
    </div>
    <div class="cap" id="lbCap"></div>
  </div>

  <!-- person modal -->

  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    const statusEl = $("#status");
    function setStatus(m, err){ statusEl.textContent = m||""; statusEl.classList.toggle("err", !!err); statusEl.classList.toggle("hidden", !m); }
    const id = new URLSearchParams(location.search).get("id");
    // Return to the search page with the prior query if we have it.
    $("#back").href = document.referrer && document.referrer.includes("/?q=") ? document.referrer : "/";

    async function getJson(url){ const r = await fetch(url); const d = await r.json().catch(()=>({error:"bad JSON"})); if(!r.ok) throw new Error(d.error||("HTTP "+r.status)); return d; }

    // ── Cold-start "waking up" banner: shown while any tracked fetch is in
    // flight longer than 3s (Render free-tier wakes in ~30-60s), hidden once all
    // pending fetches resolve. Non-blocking; sections still render as they land.
    let _pending = 0, _wakeTimer = null, _wakeEl = null;
    function wakeShow(){ if(!_wakeEl){ _wakeEl=document.createElement("div"); _wakeEl.className="wakebanner"; _wakeEl.textContent="Server waking up, one moment…"; document.body.appendChild(_wakeEl); } requestAnimationFrame(()=>_wakeEl.classList.add("show")); }
    function wakeHide(){ if(_wakeEl) _wakeEl.classList.remove("show"); }
    async function trackedFetch(url){
      _pending++;
      if(!_wakeTimer) _wakeTimer=setTimeout(wakeShow, 3000);
      try { return await getJson(url); }
      finally { if(--_pending<=0){ clearTimeout(_wakeTimer); _wakeTimer=null; wakeHide(); } }
    }

    let DETAIL = null;
    const RAW = {};
    function renderRaw(){ const el = $("#rawPre"); if (el) el.textContent = JSON.stringify(RAW, null, 2); }

    (async function init(){
      if (!id) { setStatus("No movie id in URL.", true); return; }
      try {
        DETAIL = await trackedFetch("/api/movie/" + encodeURIComponent(id));
        document.title = "TBSI · " + DETAIL.title;
        renderDetail(DETAIL);
        setStatus("");
        // Independent sections fetch in PARALLEL (fired without await) — each
        // shows its own skeleton/spinner and swaps in content when it lands, so
        // a slow videos call never blocks the gallery. Total wait = slowest call.
        loadImages(id, DETAIL.imdbId);
        loadProviders(id);
        loadVideos(id, DETAIL.title, DETAIL.year);
        loadBackground(id, DETAIL.title, DETAIL.year);
      } catch (e) { setStatus("Failed to load: " + e.message, true); }
    })();

    function fieldChips(items, cls){ if(!items||!items.length) return ""; return `<div class="chips">${items.map(x=>`<span class="chip ${cls||""}">${esc(x)}</span>`).join("")}</div>`; }
    const field = (k,v)=> v ? `<div class="field"><div class="k">${k}</div><div class="v">${v}</div></div>` : "";
    const fieldFull = (k,v,cls)=> v ? `<div class="field full"><div class="k">${k}</div><div class="v ${cls||""}">${v}</div></div>` : "";

    function renderDetail(d){
      const poster = d.posterUrl ? `<img class="poster" src="${esc(d.posterUrl)}" alt="poster" />` : `<div class="poster" style="aspect-ratio:2/3"></div>`;
      const meta=[]; if(d.year) meta.push(`<b>${esc(d.year)}</b>`); if(d.language) meta.push(esc(d.language));
      if(d.runtime) meta.push(esc(d.runtime)+" min"); if(d.status) meta.push(esc(d.status));

      const audio = d.audioLanguages ? esc(d.audioLanguages.original)+(d.audioLanguages.dubbed&&d.audioLanguages.dubbed.length?"  ·  also "+d.audioLanguages.dubbed.map(esc).join(", "):"") : "";
      const rel=[]; if(d.releaseDates&&d.releaseDates.theatrical) rel.push("Theatrical "+esc(d.releaseDates.theatrical));
      if(d.releaseDates&&d.releaseDates.ott) rel.push("OTT "+esc(d.releaseDates.ott));
      if(!rel.length&&d.releaseDate) rel.push(esc(d.releaseDate));

      const rc=[]; const R=d.ratings||{};
      if(R.tmdbScore!=null) rc.push(`TMDb ${R.tmdbScore.toFixed(1)}/10${R.tmdbVotes?" · "+R.tmdbVotes.toLocaleString()+" votes":""}`);
      if(R.imdbRating!=null) rc.push(`IMDb ${R.imdbRating.toFixed(1)}/10`);
      if(R.rottenTomatoes!=null) rc.push(`RT ${R.rottenTomatoes}%`);
      if(R.metacritic!=null) rc.push(`Metacritic ${R.metacritic}`);
      if(R.tmdbPopularity!=null) rc.push(`Popularity ${Math.round(R.tmdbPopularity)}`);

      const ids=[`<a class="link" href="https://www.themoviedb.org/movie/${d.id}" target="_blank" rel="noopener">TMDb ${d.id} ↗</a>`];
      if(d.imdbId) ids.push(`<a class="link" href="https://www.imdb.com/title/${esc(d.imdbId)}" target="_blank" rel="noopener">${esc(d.imdbId)} ↗</a>`);

      const money = (n)=> n ? "$"+n.toLocaleString() : "";

      $("#body").innerHTML = `
        <div class="seclabel"><span>Film Record</span><span class="count">TMDb ${d.id}</span></div>
        <div class="hero">
          <div>${poster}</div>
          <div>
            <h1>${esc(d.title)}</h1>
            ${d.originalTitle?`<div class="orig">${esc(d.originalTitle)}</div>`:""}
            ${d.tagline?`<div class="tagline">“${esc(d.tagline)}”</div>`:""}
            <div class="metaline">${meta.join("&nbsp; · &nbsp;")}</div>
            <button class="savebtn" id="saveBtn">☆ Save</button>
            <div class="fields">
              ${fieldFull("Synopsis", d.synopsis?esc(d.synopsis):"", "syn")}
              ${field("Genre", fieldChips(d.genre))}
              ${field("Streaming (India)", d.platforms&&d.platforms.length?fieldChips(d.platforms,"plat"):`<span style="color:var(--ink-soft)">none found</span>`)}
              ${field("Director", d.director?esc(d.director):"")}
              ${field("Music", d.musicDirector?esc(d.musicDirector):"")}
              ${field("Audio Languages", audio)}
              ${field("Spoken Languages", d.spokenLanguages?esc(d.spokenLanguages.join(", ")):"")}
              ${field("Release", rel.length?esc(rel.join("  ·  ")):"")}
              ${field("Ratings / Scores", fieldChips(rc,"score"))}
              ${field("Budget", money(d.budget))}
              ${field("Revenue", money(d.revenue))}
              ${field("Production", d.productionCompanies&&d.productionCompanies.length?esc(d.productionCompanies.join(", ")):"")}
              ${field("Country", d.productionCountries&&d.productionCountries.length?esc(d.productionCountries.join(", ")):"")}
              ${fieldFull("Identifiers", ids.join("&nbsp;&nbsp; · &nbsp;&nbsp;"))}
              ${d.homepage?fieldFull("Homepage",`<a class="link" href="${esc(d.homepage)}" target="_blank" rel="noopener">${esc(d.homepage)} ↗</a>`):""}
              ${(d.notes&&d.notes.length)?`<div class="field full">${d.notes.map(n=>`<div class="note">${esc(n)}</div>`).join("")}</div>`:""}
            </div>
          </div>
        </div>

        <div class="seclabel"><span>Cast</span><span class="count">${(d.cast||[]).length} people</span></div>
        <div class="people" id="castGrid"></div>

        <div class="seclabel"><span>Crew</span><span class="count">${(d.crew||[]).length} people</span></div>
        <div class="crewgrid" id="crewGrid"></div>

        <div id="galleryWrap">
          <div class="seclabel"><span>Poster &amp; Backdrop Gallery</span><span class="count" id="galCount"></span></div>
          <div class="tabs hidden" id="galTabs">
            <div class="tab active" data-tab="posters" id="tabPosters">Posters</div>
            <div class="tab" data-tab="backdrops" id="tabBackdrops">Backdrops</div>
          </div>
          <div class="grid" id="grid">${Array.from({length:10},()=>'<div class="skelcard"></div>').join("")}</div>
        </div>

        <div id="provWrap">
          <div class="seclabel"><span>Where to Watch</span><span class="count" id="provCount"></span></div>
          <div id="providers"><div class="loading"><span class="spinner"></span>Loading providers…</div></div>
        </div>

        <div id="videosWrap">
          <div class="seclabel"><span>Videos &amp; Trailers</span><span class="count" id="videoCount"></span></div>
          <div class="vidgrid" id="videos"><div class="loading"><span class="spinner"></span>Loading videos…</div></div>
        </div>

        <div id="bgWrap">
          <div class="seclabel"><span>Background</span><span class="count" id="bgCount"></span></div>
          <div id="bg"><div class="loading"><span class="spinner"></span>Loading background…</div></div>
        </div>

        <div class="seclabel"><span>Raw Data</span><span class="count">complete source payloads (movie · credits · omdb · images · videos · wiki)</span></div>
        <details class="raw">
          <summary>▸ Show raw JSON (rawData)</summary>
          <pre id="rawPre"></pre>
          <div class="rawbar"><button id="rawCopy">Copy JSON</button></div>
        </details>`;
      $("#body").classList.remove("hidden");

      renderCast(d.cast||[]);
      renderCrew(d.crew||[]);
      initSave(d);
      RAW.detail = d.rawData; renderRaw();
      $("#rawCopy").addEventListener("click", ()=>{ navigator.clipboard.writeText($("#rawPre").textContent).then(()=>{ $("#rawCopy").textContent="Copied ✓"; setTimeout(()=>$("#rawCopy").textContent="Copy JSON",1200); }); });
    }

    function renderCast(cast){
      $("#castGrid").innerHTML = cast.map(c=>{
        const ph = c.profileUrl ? `<span class="ph" style="background-image:url('${esc(c.profileUrl)}')"></span>` : `<span class="ph empty">no image</span>`;
        return `<div class="person" data-pid="${c.id}">
          ${ph}<div class="pm"><div class="pn">${esc(c.name)}</div>${c.character?`<div class="pr">${esc(c.character)}</div>`:""}</div>
        </div>`;
      }).join("") || `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No cast listed.</div>`;
      $("#castGrid").querySelectorAll(".person").forEach(el=> el.addEventListener("click", ()=> openPerson(Number(el.dataset.pid))));
    }
    function renderCrew(crew){
      $("#crewGrid").innerHTML = crew.map(c=>`<div class="crewrow" data-pid="${c.id}"><span class="cn">${esc(c.name)}</span><span class="cj">${esc(c.job)}${c.department&&c.department!==c.job?" · "+esc(c.department):""}</span></div>`).join("")
        || `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No crew listed.</div>`;
      $("#crewGrid").querySelectorAll(".crewrow").forEach(el=> el.addEventListener("click", ()=> openPerson(Number(el.dataset.pid))));
    }

    // ── Gallery ──
    let GAL={posters:[],backdrops:[]}, curTab="posters";
    async function loadImages(mid, imdbId){
      try {
        const g = await trackedFetch("/api/movie/"+encodeURIComponent(mid)+"/images"+(imdbId?"?imdbId="+encodeURIComponent(imdbId):""));
        GAL={posters:g.posters||[],backdrops:g.backdrops||[]};
        const srcTxt = (g.sources||[]).length?"  ·  sources: "+g.sources.join(", "):"";
        $("#galCount").textContent = GAL.posters.length+" posters · "+GAL.backdrops.length+" backdrops"+srcTxt;
        curTab = GAL.posters.length?"posters":"backdrops"; syncTabs(); renderGrid();
        $("#galTabs").classList.remove("hidden");   // reveal tabs now that data is in
        $("#tabPosters").addEventListener("click", ()=>{curTab="posters";syncTabs();renderGrid();});
        $("#tabBackdrops").addEventListener("click", ()=>{curTab="backdrops";syncTabs();renderGrid();});
        RAW.images = g.rawData; renderRaw();
      } catch(e){ $("#galCount").textContent="unavailable"; $("#grid").innerHTML=`<div class="loading err">Couldn’t load the gallery.</div>`; }
    }

    // ── Where to watch (providers) ──
    async function loadProviders(mid){
      try {
        const p = await trackedFetch("/api/movie/"+encodeURIComponent(mid)+"/providers?country=IN");
        RAW.providers = p.rawData; renderRaw();
        const countries = p.countries || {};
        const order = [p.prefer||"IN", "US", "GB"].filter((c,i,a)=>a.indexOf(c)===i);
        const rest = Object.keys(countries).filter(c=>!order.includes(c)).sort();
        const codes = [...order.filter(c=>countries[c]), ...rest];
        if (!codes.length){ $("#provCount").textContent="none listed"; $("#providers").innerHTML=`<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No streaming providers listed (JustWatch via TMDb).</div>`; return; }
        $("#provCount").textContent = codes.length+" region"+(codes.length===1?"":"s");
        const kinds = [["flatrate","Stream"],["free","Free"],["ads","With ads"],["rent","Rent"],["buy","Buy"]];
        $("#providers").innerHTML = codes.map(code=>{
          const c = countries[code];
          const rows = kinds.filter(([k])=>(c[k]||[]).length).map(([k,label])=>`
            <div class="prow"><span class="pk">${label}</span><span class="pv">${c[k].map(pr=>`<span class="pchip">${pr.logoUrl?`<img src="${esc(pr.logoUrl)}" alt=""/>`:""}${esc(pr.name)}</span>`).join("")}</span></div>`).join("");
          if (!rows) return "";
          return `<div class="pcountry"><div class="pcode">${esc(code)}${c.link?` · <a class="link" href="${esc(c.link)}" target="_blank" rel="noopener">JustWatch ↗</a>`:""}</div>${rows}</div>`;
        }).join("") || `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No streaming providers listed.</div>`;
      } catch(e){ $("#provCount").textContent="unavailable"; $("#providers").innerHTML=`<div class="loading err">Couldn’t load providers.</div>`; }
    }

    // ── Videos / trailers ──
    async function loadVideos(mid, title, year){
      try {
        const v = await trackedFetch("/api/movie/"+encodeURIComponent(mid)+"/videos?title="+encodeURIComponent(title||"")+(year?"&year="+year:""));
        RAW.videos = v.rawData; renderRaw();
        const vids = v.videos||[];
        $("#videoCount").textContent = vids.length + (vids.length===1?" video":" videos") + ((v.sources||[]).length?"  ·  "+v.sources.join(", "):"");
        if (!vids.length){ $("#videos").innerHTML = `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No videos available.</div>`; }
        else {
          $("#videos").innerHTML = vids.map(v=>`
            <a class="vid" href="${esc(v.url)}" target="_blank" rel="noopener">
              <span class="vthumb"${v.thumbUrl?` style="background-image:url('${esc(v.thumbUrl)}')"`:""}><span class="play">▶</span></span>
              <span class="vmeta"><span class="vname">${esc(v.name)}</span><span class="vtype">${esc(v.type)}${v.official?" · official":""} · ${esc(v.source)}${v.channel?" · "+esc(v.channel):""}</span></span>
            </a>`).join("");
        }
      } catch(e){ $("#videoCount").textContent="unavailable"; $("#videos").innerHTML=`<div class="loading err">Couldn’t load videos.</div>`; }
    }

    // ── Wikipedia background ──
    async function loadBackground(mid, title, year){
      try {
        const b = await trackedFetch("/api/movie/"+encodeURIComponent(mid)+"/wiki?title="+encodeURIComponent(title)+(year?"&year="+year:""));
        RAW.background = b.results; renderRaw();
        const found = (b.results||[]).filter(r=>r.found);
        if (!found.length){ $("#bgCount").textContent="no article found"; $("#bg").innerHTML = `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No Wikipedia article found for this title.</div>`; return; }
        $("#bgCount").textContent = found.map(r=>r.source).join(", ");
        $("#bg").innerHTML = found.map(r=>`
          <div class="bgcard">
            ${r.thumbnail?`<img class="bgthumb" src="${esc(r.thumbnail)}" alt="" />`:""}
            <div class="bgbody">
              <div class="bgtitle">${esc(r.title)}${r.description?` <span class="bgdesc">— ${esc(r.description)}</span>`:""}</div>
              <div class="bgextract">${esc(r.extract)}</div>
              <a class="link" href="${esc(r.url)}" target="_blank" rel="noopener">Read full article on ${esc(r.source)} ↗</a>
            </div>
          </div>`).join("");
      } catch(e){ $("#bgCount").textContent="unavailable"; $("#bg").innerHTML=`<div class="loading err">Couldn’t load background.</div>`; }
    }
    function syncTabs(){ $("#tabPosters").classList.toggle("active",curTab==="posters"); $("#tabBackdrops").classList.toggle("active",curTab==="backdrops"); }
    function renderGrid(){
      const list=GAL[curTab]||[], grid=$("#grid");
      grid.classList.toggle("backdrops",curTab==="backdrops");
      if(!list.length){ grid.innerHTML=`<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No ${curTab} available.</div>`; return; }
      grid.innerHTML = list.map((im,i)=>`<div class="gimg" data-i="${i}">
        <img loading="lazy" src="${esc(im.thumbUrl)}" alt="" />
        <span class="src ${im.source==='omdb'?'omdb':''}">${esc(im.source)}</span>
        ${im.language?`<span class="tag">${esc(im.language)}</span>`:""}
        ${im.width?`<span class="dim">${im.width}×${im.height}</span>`:""}
      </div>`).join("");
      grid.querySelectorAll(".gimg").forEach(el=> el.addEventListener("click", ()=> openLbAt(GAL[curTab]||[], Number(el.dataset.i))));
    }

    // ── Shared lightbox slideshow ──
    // Prev/Next cycle within the CURRENTLY ACTIVE tab's list (posters or
    // backdrops), in grid order, with wrap-around. Download/Open/caption
    // always target the image currently shown.
    let LB_LIST = [], LB_INDEX = 0;
    function openLbAt(list, i){
      if (!list || !list.length) return;
      LB_LIST = list;
      LB_INDEX = ((i % list.length) + list.length) % list.length;
      showLb();
      $("#lb").classList.add("open");
    }
    function showLb(){
      const im = LB_LIST[LB_INDEX]; if (!im) return;
      $("#lbImg").src = im.fullUrl; $("#lbOpen").href = im.fullUrl;
      $("#lbDownload").href = "/api/download?url="+encodeURIComponent(im.fullUrl);
      $("#lbCap").textContent = (im.width?im.width+"×"+im.height+" · ":"")+"full resolution"+(im.source?" · "+im.source:"")+(im.language?" · "+im.language:"");
      const multi = LB_LIST.length > 1;
      $("#lbCounter").textContent = multi ? (LB_INDEX + 1) + " / " + LB_LIST.length : "";
      $("#lbPrev").classList.toggle("hidden", !multi);
      $("#lbNext").classList.toggle("hidden", !multi);
      preloadNext();
    }
    function navLb(dir){
      if (LB_LIST.length < 2) return;
      LB_INDEX = (LB_INDEX + dir + LB_LIST.length) % LB_LIST.length;
      showLb();
    }
    function preloadNext(){
      if (LB_LIST.length < 2) return;
      const n = LB_LIST[(LB_INDEX + 1) % LB_LIST.length];
      if (n && n.fullUrl){ const img = new Image(); img.src = n.fullUrl; }
    }
    function closeLb(){ $("#lb").classList.remove("open"); $("#lbImg").src=""; }
    $("#lbClose").addEventListener("click", closeLb);
    $("#lbPrev").addEventListener("click", e=>{ e.stopPropagation(); navLb(-1); });
    $("#lbNext").addEventListener("click", e=>{ e.stopPropagation(); navLb(1); });
    $("#lb").addEventListener("click", e=>{ if(e.target===$("#lb")) closeLb(); });
    // Touch swipe: left-swipe = Next, right-swipe = Prev.
    let lbTsX = 0, lbTsY = 0;
    $("#lb").addEventListener("touchstart", e=>{ if(e.touches.length===1){ lbTsX=e.touches[0].clientX; lbTsY=e.touches[0].clientY; } }, {passive:true});
    $("#lb").addEventListener("touchend", e=>{
      const t = e.changedTouches[0]; if(!t) return;
      const dx = t.clientX - lbTsX, dy = t.clientY - lbTsY;
      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) navLb(dx < 0 ? 1 : -1);
    }, {passive:true});

    // ── Watchlist "☆ Save / ★ Saved" toggle ──
    async function initSave(d){
      const btn = $("#saveBtn"); if(!btn) return;
      let saved = false;
      try { const w = await getJson("/api/watchlist"); saved = (w.items||[]).some(i=>i.type==="film" && String(i.tmdbId)===String(d.id)); } catch(e){ /* watchlist best-effort */ }
      const paint = ()=>{ btn.textContent = saved ? "★ Saved" : "☆ Save"; btn.classList.toggle("on", saved); };
      paint();
      btn.addEventListener("click", async ()=>{
        btn.disabled = true;
        try {
          if (saved){ await fetch(`/api/watchlist/film/${d.id}`, { method:"DELETE" }); saved = false; }
          else { await fetch("/api/watchlist", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ type:"film", id:d.id, title:d.title }) }); saved = true; }
          paint();
        } catch(e){ /* leave state */ } finally { btn.disabled = false; }
      });
    }

    // ── Person modal ──
    // Clicking a cast/crew person opens the rich person page (bio + age +
    // filmography poster grid + full image gallery).
    function openPerson(pid){ location.href = "/person.html?id=" + pid; }

    document.addEventListener("keydown", e=>{
      if (!$("#lb").classList.contains("open")) return;
      if (e.key === "Escape") closeLb();
      else if (e.key === "ArrowLeft"){ e.preventDefault(); navLb(-1); }
      else if (e.key === "ArrowRight"){ e.preventDefault(); navLb(1); }
    });
  </script>
  <script>
    // PWA: register the app-shell service worker (installable + offline shell).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
