<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>TBSI · Film Record</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:#1A1614; --cream:#F4ECDC; --vermillion:#A33223; --brass:#C49A3F;
      --green:#2E5742; --oxblood:#682D25; --maroon:#581F16; --paper:#F4ECDC;
      --line:rgba(26,22,20,0.28); --ink-soft:rgba(26,22,20,0.66);
      --serif:"Playfair Display",Georgia,serif; --sans:"Inter",system-ui,sans-serif;
      --mono:"JetBrains Mono",ui-monospace,Consolas,monospace;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;
      background-image:radial-gradient(rgba(104,45,37,0.04) 1px,transparent 1px);background-size:4px 4px;}
    .wrap{max-width:1120px;margin:0 auto;padding:22px 22px 90px;}
    a{color:var(--vermillion);}
    .topbar{display:flex;justify-content:space-between;align-items:center;border-bottom:3px double var(--ink);padding-bottom:10px;}
    .back{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:var(--oxblood);}
    .back:hover{color:var(--vermillion);}
    .brand{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);}
    .status{text-align:center;font-family:var(--mono);font-size:12px;color:var(--ink-soft);min-height:18px;margin:18px 0;}
    .status.err{color:var(--vermillion);font-weight:700;}

    .seclabel{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--oxblood);margin:34px 0 14px;border-bottom:1px solid var(--line);padding-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;}
    .seclabel .count{color:var(--ink-soft);font-weight:500;}

    .hero{display:grid;grid-template-columns:240px 1fr;gap:28px;margin-top:18px;}
    @media (max-width:640px){.hero{grid-template-columns:1fr;}}
    .hero .poster{width:100%;border:1px solid var(--ink);border-radius:2px;background:#e6dcc6;display:block;}
    .hero h1{font-family:var(--serif);font-weight:900;font-size:clamp(28px,5vw,44px);line-height:1.02;margin:0 0 4px;}
    .hero .orig{font-family:var(--serif);font-style:italic;color:var(--ink-soft);font-size:18px;margin-bottom:8px;}
    .hero .tagline{font-family:var(--serif);font-style:italic;color:var(--oxblood);font-size:16px;margin:8px 0;}
    .metaline{font-family:var(--mono);font-size:12px;letter-spacing:.05em;margin:8px 0 14px;}
    .metaline b{color:var(--vermillion);}
    .fields{display:grid;grid-template-columns:repeat(2,1fr);gap:16px 26px;margin-top:8px;}
    @media (max-width:640px){.fields{grid-template-columns:1fr;}}
    .field.full{grid-column:1/-1;}
    .field .k{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--oxblood);margin-bottom:4px;}
    .field .v{font-size:15px;}
    .field .v.syn{font-family:var(--serif);font-size:16px;line-height:1.55;}
    .chips{display:flex;flex-wrap:wrap;gap:6px;}
    .chip{font-family:var(--mono);font-size:11px;padding:3px 9px;border:1px solid var(--line);border-radius:2px;background:#fbf6ea;}
    .chip.plat{border-color:var(--green);color:var(--green);font-weight:700;}
    .chip.score{border-color:var(--brass);background:rgba(196,154,63,.15);font-weight:700;}
    a.link{color:var(--vermillion);text-decoration:none;border-bottom:1px solid rgba(163,50,35,.4);}
    a.link:hover{color:var(--oxblood);}
    .note{font-family:var(--mono);font-size:11px;color:var(--ink-soft);line-height:1.5;border-left:3px solid var(--brass);padding:4px 0 4px 10px;margin-top:6px;}

    /* people */
    .people{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;}
    .person{cursor:pointer;border:1px solid var(--line);background:#fbf6ea;border-radius:2px;overflow:hidden;transition:transform .08s,border-color .08s;}
    .person:hover{transform:translateY(-2px);border-color:var(--vermillion);}
    .person .ph{aspect-ratio:2/3;background:#e6dcc6 center/cover no-repeat;display:flex;align-items:center;justify-content:center;}
    .person .ph.empty{font-family:var(--mono);font-size:10px;color:var(--ink-soft);text-align:center;padding:8px;}
    .person .pm{padding:7px 8px 9px;}
    .person .pn{font-family:var(--serif);font-weight:700;font-size:13px;line-height:1.15;}
    .person .pr{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-top:3px;}
    .crewgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px 18px;}
    .crewrow{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 0;border-bottom:1px dotted var(--line);cursor:pointer;}
    .crewrow:hover .cn{color:var(--vermillion);}
    .crewrow .cn{font-weight:600;}
    .crewrow .cj{font-family:var(--mono);font-size:10px;color:var(--ink-soft);text-align:right;text-transform:uppercase;letter-spacing:.05em;}

    /* gallery */
    .tabs{display:flex;gap:8px;margin:6px 0 14px;flex-wrap:wrap;}
    .tab{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--ink);background:#fbf6ea;cursor:pointer;border-radius:2px;}
    .tab.active{background:var(--ink);color:var(--cream);}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
    .grid.backdrops{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
    .gimg{position:relative;border:1px solid var(--line);border-radius:2px;overflow:hidden;background:#e6dcc6;cursor:pointer;}
    .gimg img{width:100%;display:block;}
    .gimg .tag{position:absolute;top:6px;left:6px;font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;background:rgba(26,22,20,.82);color:var(--cream);padding:2px 6px;border-radius:2px;}
    .gimg .src{position:absolute;top:6px;right:6px;font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;background:var(--green);color:var(--cream);padding:2px 6px;border-radius:2px;}
    .gimg .src.omdb{background:var(--brass);color:var(--ink);}
    .gimg .dim{position:absolute;bottom:6px;right:6px;font-family:var(--mono);font-size:9px;background:rgba(26,22,20,.72);color:var(--cream);padding:2px 6px;border-radius:2px;}

    /* raw */
    details.raw{margin-top:12px;border:1px solid var(--line);border-radius:2px;background:#fbf6ea;}
    details.raw summary{cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--oxblood);padding:12px 14px;user-select:none;}
    details.raw[open] summary{border-bottom:1px solid var(--line);}
    details.raw pre{margin:0;padding:14px;overflow:auto;max-height:560px;font-family:var(--mono);font-size:11.5px;line-height:1.5;color:var(--ink);}
    .rawbar{display:flex;gap:10px;padding:8px 14px;border-top:1px solid var(--line);}
    .rawbar button{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:5px 12px;border:1px solid var(--ink);background:var(--cream);border-radius:2px;cursor:pointer;}

    /* lightbox */
    .lb{position:fixed;inset:0;background:rgba(20,16,14,.93);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:120;padding:24px;}
    .lb.open{display:flex;}
    .lb img{max-width:92vw;max-height:76vh;border:2px solid var(--cream);box-shadow:0 18px 60px rgba(0,0,0,.6);}
    .lb .bar{display:flex;gap:12px;margin-top:16px;align-items:center;flex-wrap:wrap;justify-content:center;}
    .lb a,.lb button{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 18px;border-radius:2px;cursor:pointer;text-decoration:none;border:1.5px solid var(--cream);}
    .lb .dl{background:var(--brass);color:var(--ink);border-color:var(--brass);}
    .lb .open2{background:transparent;color:var(--cream);}
    .lb .close{background:var(--vermillion);color:var(--cream);border-color:var(--vermillion);}
    .lb .cap{font-family:var(--mono);font-size:11px;color:var(--cream);opacity:.85;margin-top:8px;}

    /* person modal */
    .modal{position:fixed;inset:0;background:rgba(20,16,14,.75);display:none;align-items:flex-start;justify-content:center;z-index:80;padding:34px 18px;overflow:auto;}
    .modal.open{display:flex;}
    .sheet{background:var(--paper);max-width:940px;width:100%;border:2px solid var(--ink);border-radius:3px;padding:22px 24px 30px;box-shadow:0 24px 80px rgba(0,0,0,.5);}
    .sheet .x{float:right;font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;border:1.5px solid var(--vermillion);color:var(--cream);background:var(--vermillion);padding:6px 12px;border-radius:2px;cursor:pointer;}
    .phead{display:grid;grid-template-columns:130px 1fr;gap:20px;}
    @media (max-width:560px){.phead{grid-template-columns:1fr;}}
    .phead .ppic{width:100%;border:1px solid var(--ink);border-radius:2px;background:#e6dcc6;}
    .phead h2{font-family:var(--serif);font-weight:900;font-size:28px;margin:0 0 4px;}
    .phead .pmeta{font-family:var(--mono);font-size:11px;color:var(--ink-soft);line-height:1.7;}
    .bio{font-family:var(--serif);font-size:14.5px;line-height:1.55;margin-top:12px;max-height:180px;overflow:auto;}
    .kf{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
    .kf a,.kf span{font-family:var(--mono);font-size:11px;padding:3px 8px;border:1px solid var(--line);border-radius:2px;background:#fbf6ea;text-decoration:none;color:var(--ink);}

    .hidden{display:none!important;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" id="back" href="/">← Search</a>
      <span class="brand">TBSI · Film Record · Localhost</span>
    </div>
    <div class="status" id="status">Loading…</div>
    <div id="body" class="hidden"></div>
  </div>

  <!-- shared lightbox -->
  <div class="lb" id="lb">
    <img id="lbImg" alt="" />
    <div class="bar">
      <a class="dl" id="lbDownload" href="#">Download full-res</a>
      <a class="open2" id="lbOpen" href="#" target="_blank" rel="noopener">Open original ↗</a>
      <button class="close" id="lbClose">Close ✕</button>
    </div>
    <div class="cap" id="lbCap"></div>
  </div>

  <!-- person modal -->
  <div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    const statusEl = $("#status");
    function setStatus(m, err){ statusEl.textContent = m||""; statusEl.classList.toggle("err", !!err); statusEl.classList.toggle("hidden", !m); }
    const id = new URLSearchParams(location.search).get("id");
    // Return to the search page with the prior query if we have it.
    $("#back").href = document.referrer && document.referrer.includes("/?q=") ? document.referrer : "/";

    async function getJson(url){ const r = await fetch(url); const d = await r.json().catch(()=>({error:"bad JSON"})); if(!r.ok) throw new Error(d.error||("HTTP "+r.status)); return d; }

    let DETAIL = null;

    (async function init(){
      if (!id) { setStatus("No movie id in URL.", true); return; }
      try {
        DETAIL = await getJson("/api/movie/" + encodeURIComponent(id));
        document.title = "TBSI · " + DETAIL.title;
        renderDetail(DETAIL);
        setStatus("");
        loadImages(id, DETAIL.imdbId);
      } catch (e) { setStatus("Failed to load: " + e.message, true); }
    })();

    function fieldChips(items, cls){ if(!items||!items.length) return ""; return `<div class="chips">${items.map(x=>`<span class="chip ${cls||""}">${esc(x)}</span>`).join("")}</div>`; }
    const field = (k,v)=> v ? `<div class="field"><div class="k">${k}</div><div class="v">${v}</div></div>` : "";
    const fieldFull = (k,v,cls)=> v ? `<div class="field full"><div class="k">${k}</div><div class="v ${cls||""}">${v}</div></div>` : "";

    function renderDetail(d){
      const poster = d.posterUrl ? `<img class="poster" src="${esc(d.posterUrl)}" alt="poster" />` : `<div class="poster" style="aspect-ratio:2/3"></div>`;
      const meta=[]; if(d.year) meta.push(`<b>${esc(d.year)}</b>`); if(d.language) meta.push(esc(d.language));
      if(d.runtime) meta.push(esc(d.runtime)+" min"); if(d.status) meta.push(esc(d.status));

      const audio = d.audioLanguages ? esc(d.audioLanguages.original)+(d.audioLanguages.dubbed&&d.audioLanguages.dubbed.length?"  ·  also "+d.audioLanguages.dubbed.map(esc).join(", "):"") : "";
      const rel=[]; if(d.releaseDates&&d.releaseDates.theatrical) rel.push("Theatrical "+esc(d.releaseDates.theatrical));
      if(d.releaseDates&&d.releaseDates.ott) rel.push("OTT "+esc(d.releaseDates.ott));
      if(!rel.length&&d.releaseDate) rel.push(esc(d.releaseDate));

      const rc=[]; const R=d.ratings||{};
      if(R.tmdbScore!=null) rc.push(`TMDb ${R.tmdbScore.toFixed(1)}/10${R.tmdbVotes?" · "+R.tmdbVotes.toLocaleString()+" votes":""}`);
      if(R.imdbRating!=null) rc.push(`IMDb ${R.imdbRating.toFixed(1)}/10`);
      if(R.rottenTomatoes!=null) rc.push(`RT ${R.rottenTomatoes}%`);
      if(R.metacritic!=null) rc.push(`Metacritic ${R.metacritic}`);
      if(R.tmdbPopularity!=null) rc.push(`Popularity ${Math.round(R.tmdbPopularity)}`);

      const ids=[`<a class="link" href="https://www.themoviedb.org/movie/${d.id}" target="_blank" rel="noopener">TMDb ${d.id} ↗</a>`];
      if(d.imdbId) ids.push(`<a class="link" href="https://www.imdb.com/title/${esc(d.imdbId)}" target="_blank" rel="noopener">${esc(d.imdbId)} ↗</a>`);

      const money = (n)=> n ? "$"+n.toLocaleString() : "";

      $("#body").innerHTML = `
        <div class="seclabel"><span>Film Record</span><span class="count">TMDb ${d.id}</span></div>
        <div class="hero">
          <div>${poster}</div>
          <div>
            <h1>${esc(d.title)}</h1>
            ${d.originalTitle?`<div class="orig">${esc(d.originalTitle)}</div>`:""}
            ${d.tagline?`<div class="tagline">“${esc(d.tagline)}”</div>`:""}
            <div class="metaline">${meta.join("&nbsp; · &nbsp;")}</div>
            <div class="fields">
              ${fieldFull("Synopsis", d.synopsis?esc(d.synopsis):"", "syn")}
              ${field("Genre", fieldChips(d.genre))}
              ${field("Streaming (India)", d.platforms&&d.platforms.length?fieldChips(d.platforms,"plat"):`<span style="color:var(--ink-soft)">none found</span>`)}
              ${field("Director", d.director?esc(d.director):"")}
              ${field("Music", d.musicDirector?esc(d.musicDirector):"")}
              ${field("Audio Languages", audio)}
              ${field("Spoken Languages", d.spokenLanguages?esc(d.spokenLanguages.join(", ")):"")}
              ${field("Release", rel.length?esc(rel.join("  ·  ")):"")}
              ${field("Ratings / Scores", fieldChips(rc,"score"))}
              ${field("Budget", money(d.budget))}
              ${field("Revenue", money(d.revenue))}
              ${field("Production", d.productionCompanies&&d.productionCompanies.length?esc(d.productionCompanies.join(", ")):"")}
              ${field("Country", d.productionCountries&&d.productionCountries.length?esc(d.productionCountries.join(", ")):"")}
              ${fieldFull("Identifiers", ids.join("&nbsp;&nbsp; · &nbsp;&nbsp;"))}
              ${d.homepage?fieldFull("Homepage",`<a class="link" href="${esc(d.homepage)}" target="_blank" rel="noopener">${esc(d.homepage)} ↗</a>`):""}
              ${(d.notes&&d.notes.length)?`<div class="field full">${d.notes.map(n=>`<div class="note">${esc(n)}</div>`).join("")}</div>`:""}
            </div>
          </div>
        </div>

        <div class="seclabel"><span>Cast</span><span class="count">${(d.cast||[]).length} people</span></div>
        <div class="people" id="castGrid"></div>

        <div class="seclabel"><span>Crew</span><span class="count">${(d.crew||[]).length} people</span></div>
        <div class="crewgrid" id="crewGrid"></div>

        <div id="galleryWrap" class="hidden">
          <div class="seclabel"><span>Poster &amp; Backdrop Gallery</span><span class="count" id="galCount"></span></div>
          <div class="tabs">
            <div class="tab active" data-tab="posters" id="tabPosters">Posters</div>
            <div class="tab" data-tab="backdrops" id="tabBackdrops">Backdrops</div>
          </div>
          <div class="grid" id="grid"></div>
        </div>

        <div class="seclabel"><span>Raw Data</span><span class="count">complete source payloads</span></div>
        <details class="raw">
          <summary>▸ Show raw JSON (rawData)</summary>
          <pre id="rawPre"></pre>
          <div class="rawbar"><button id="rawCopy">Copy JSON</button></div>
        </details>`;
      $("#body").classList.remove("hidden");

      renderCast(d.cast||[]);
      renderCrew(d.crew||[]);
      $("#rawPre").textContent = JSON.stringify(d.rawData, null, 2);
      $("#rawCopy").addEventListener("click", ()=>{ navigator.clipboard.writeText($("#rawPre").textContent).then(()=>{ $("#rawCopy").textContent="Copied ✓"; setTimeout(()=>$("#rawCopy").textContent="Copy JSON",1200); }); });
    }

    function renderCast(cast){
      $("#castGrid").innerHTML = cast.map(c=>{
        const ph = c.profileUrl ? `<span class="ph" style="background-image:url('${esc(c.profileUrl)}')"></span>` : `<span class="ph empty">no image</span>`;
        return `<div class="person" data-pid="${c.id}">
          ${ph}<div class="pm"><div class="pn">${esc(c.name)}</div>${c.character?`<div class="pr">${esc(c.character)}</div>`:""}</div>
        </div>`;
      }).join("") || `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No cast listed.</div>`;
      $("#castGrid").querySelectorAll(".person").forEach(el=> el.addEventListener("click", ()=> openPerson(Number(el.dataset.pid))));
    }
    function renderCrew(crew){
      $("#crewGrid").innerHTML = crew.map(c=>`<div class="crewrow" data-pid="${c.id}"><span class="cn">${esc(c.name)}</span><span class="cj">${esc(c.job)}${c.department&&c.department!==c.job?" · "+esc(c.department):""}</span></div>`).join("")
        || `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No crew listed.</div>`;
      $("#crewGrid").querySelectorAll(".crewrow").forEach(el=> el.addEventListener("click", ()=> openPerson(Number(el.dataset.pid))));
    }

    // ── Gallery ──
    let GAL={posters:[],backdrops:[]}, curTab="posters";
    async function loadImages(mid, imdbId){
      try {
        const g = await getJson("/api/movie/"+encodeURIComponent(mid)+"/images"+(imdbId?"?imdbId="+encodeURIComponent(imdbId):""));
        GAL={posters:g.posters||[],backdrops:g.backdrops||[]};
        const srcTxt = (g.sources||[]).length?"  ·  sources: "+g.sources.join(", "):"";
        $("#galCount").textContent = GAL.posters.length+" posters · "+GAL.backdrops.length+" backdrops"+srcTxt;
        curTab = GAL.posters.length?"posters":"backdrops"; syncTabs(); renderGrid();
        $("#galleryWrap").classList.remove("hidden");
        $("#tabPosters").addEventListener("click", ()=>{curTab="posters";syncTabs();renderGrid();});
        $("#tabBackdrops").addEventListener("click", ()=>{curTab="backdrops";syncTabs();renderGrid();});
      } catch(e){ /* gallery best-effort */ }
    }
    function syncTabs(){ $("#tabPosters").classList.toggle("active",curTab==="posters"); $("#tabBackdrops").classList.toggle("active",curTab==="backdrops"); }
    function renderGrid(){
      const list=GAL[curTab]||[], grid=$("#grid");
      grid.classList.toggle("backdrops",curTab==="backdrops");
      if(!list.length){ grid.innerHTML=`<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No ${curTab} available.</div>`; return; }
      grid.innerHTML = list.map((im,i)=>`<div class="gimg" data-i="${i}">
        <img loading="lazy" src="${esc(im.thumbUrl)}" alt="" />
        <span class="src ${im.source==='omdb'?'omdb':''}">${esc(im.source)}</span>
        ${im.language?`<span class="tag">${esc(im.language)}</span>`:""}
        ${im.width?`<span class="dim">${im.width}×${im.height}</span>`:""}
      </div>`).join("");
      grid.querySelectorAll(".gimg").forEach(el=> el.addEventListener("click", ()=> openLb(list[Number(el.dataset.i)])));
    }

    // ── Shared lightbox ──
    function openLb(im){
      $("#lbImg").src = im.fullUrl; $("#lbOpen").href = im.fullUrl;
      $("#lbDownload").href = "/api/download?url="+encodeURIComponent(im.fullUrl);
      $("#lbCap").textContent = (im.width?im.width+"×"+im.height+" · ":"")+"full resolution"+(im.source?" · "+im.source:"")+(im.language?" · "+im.language:"");
      $("#lb").classList.add("open");
    }
    function closeLb(){ $("#lb").classList.remove("open"); $("#lbImg").src=""; }
    $("#lbClose").addEventListener("click", closeLb);
    $("#lb").addEventListener("click", e=>{ if(e.target===$("#lb")) closeLb(); });

    // ── Person modal ──
    async function openPerson(pid){
      const sheet=$("#sheet"); $("#modal").classList.add("open");
      sheet.innerHTML = `<button class="x" id="pClose">Close ✕</button><div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft);padding:20px 0">Loading person…</div>`;
      $("#pClose").addEventListener("click", closePerson);
      try {
        const p = await getJson("/api/person/"+encodeURIComponent(pid));
        const pic = p.profileUrl ? `<img class="ppic" src="${esc(p.profileUrl)}" alt="" />` : `<div class="ppic" style="aspect-ratio:2/3"></div>`;
        const m=[];
        if(p.knownForDepartment) m.push("Known for: "+esc(p.knownForDepartment));
        if(p.birthday) m.push("Born "+esc(p.birthday)+(p.placeOfBirth?" · "+esc(p.placeOfBirth):""));
        if(p.deathday) m.push("Died "+esc(p.deathday));
        if(p.gender) m.push(esc(p.gender));
        if(p.imdbId) m.push(`<a class="link" href="https://www.imdb.com/name/${esc(p.imdbId)}" target="_blank" rel="noopener">${esc(p.imdbId)} ↗</a>`);
        m.push(`<a class="link" href="https://www.themoviedb.org/person/${p.id}" target="_blank" rel="noopener">TMDb ${p.id} ↗</a>`);

        const kf = (p.knownFor||[]).map(k=> k.mediaType==="movie"
          ? `<a href="/movie.html?id=${k.id}">${esc(k.title)}${k.year?" ("+k.year+")":""}</a>`
          : `<span>${esc(k.title)}${k.year?" ("+k.year+")":""}</span>`).join("");

        const imgs = p.images||[];
        const gallery = imgs.length
          ? `<div class="grid" style="margin-top:6px">${imgs.map((im,i)=>`<div class="gimg" data-pi="${i}"><img loading="lazy" src="${esc(im.thumbUrl)}" alt=""/><span class="src">${esc(im.source)}</span>${im.width?`<span class="dim">${im.width}×${im.height}</span>`:""}</div>`).join("")}</div>`
          : `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-top:8px">No additional images available.</div>`;

        sheet.innerHTML = `
          <button class="x" id="pClose">Close ✕</button>
          <div class="phead">
            <div>${pic}</div>
            <div>
              <h2>${esc(p.name)}</h2>
              <div class="pmeta">${m.join("<br>")}</div>
              ${kf?`<div style="font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--oxblood);margin-top:12px">Known For</div><div class="kf">${kf}</div>`:""}
              ${p.biography?`<div class="bio">${esc(p.biography)}</div>`:""}
            </div>
          </div>
          <div style="font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--oxblood);margin:20px 0 8px;border-bottom:1px solid var(--line);padding-bottom:6px">
            Image Gallery — ${imgs.length} image${imgs.length===1?"":"s"}${(p.imageSources||[]).length?"  ·  "+p.imageSources.join(", "):""}
          </div>
          ${gallery}`;
        $("#pClose").addEventListener("click", closePerson);
        sheet.querySelectorAll(".gimg").forEach(el=> el.addEventListener("click", ()=> openLb(imgs[Number(el.dataset.pi)])));
      } catch(e){
        sheet.innerHTML = `<button class="x" id="pClose">Close ✕</button><div style="font-family:var(--mono);font-size:12px;color:var(--vermillion);padding:20px 0">Failed to load person: ${esc(e.message)}</div>`;
        $("#pClose").addEventListener("click", closePerson);
      }
    }
    function closePerson(){ $("#modal").classList.remove("open"); }
    $("#modal").addEventListener("click", e=>{ if(e.target===$("#modal")) closePerson(); });

    document.addEventListener("keydown", e=>{ if(e.key==="Escape"){ if($("#lb").classList.contains("open")) closeLb(); else closePerson(); } });
  </script>
</body>
</html>
