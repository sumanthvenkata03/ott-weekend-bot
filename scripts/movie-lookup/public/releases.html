<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>TBSI · In Cinemas &amp; Upcoming</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1A1614" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:#1A1614; --cream:#F4ECDC; --vermillion:#A33223; --brass:#C49A3F;
      --green:#2E5742; --oxblood:#682D25; --maroon:#581F16; --paper:#F4ECDC;
      --line:rgba(26,22,20,0.28); --ink-soft:rgba(26,22,20,0.66);
      --serif:"Playfair Display",Georgia,serif; --sans:"Inter",system-ui,sans-serif;
      --mono:"JetBrains Mono",ui-monospace,Consolas,monospace;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;
      background-image:radial-gradient(rgba(104,45,37,0.04) 1px,transparent 1px);background-size:4px 4px;}
    .wrap{max-width:1120px;margin:0 auto;padding:22px 22px 90px;}
    a{color:var(--vermillion);}
    .topbar{display:flex;justify-content:space-between;align-items:center;border-bottom:3px double var(--ink);padding-bottom:10px;gap:10px;flex-wrap:wrap;}
    .back{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:var(--oxblood);}
    .back:hover{color:var(--vermillion);}
    .brand{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);}
    h1{font-family:var(--serif);font-weight:900;font-size:clamp(26px,5vw,40px);margin:16px 0 2px;}
    .lede{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:.04em;margin-bottom:8px;}
    .tabs{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap;}
    .tab{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;border:1px solid var(--ink);background:#fbf6ea;cursor:pointer;border-radius:2px;}
    .tab.active{background:var(--ink);color:var(--cream);}
    .seclabel{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--oxblood);margin:10px 0 12px;border-bottom:1px solid var(--line);padding-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;}
    .seclabel .count{color:var(--ink-soft);font-weight:500;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}
    .card{cursor:pointer;border:1px solid var(--line);background:#fbf6ea;border-radius:2px;overflow:hidden;text-decoration:none;color:inherit;display:block;transition:transform .08s,border-color .08s;}
    .card:hover{transform:translateY(-2px);border-color:var(--vermillion);}
    .card .p{aspect-ratio:2/3;background:#e6dcc6 center/cover no-repeat;display:flex;align-items:center;justify-content:center;}
    .card .p.empty{font-family:var(--mono);font-size:10px;color:var(--ink-soft);}
    .card .m{padding:8px 9px 10px;}
    .card .t{font-family:var(--serif);font-weight:700;font-size:14px;line-height:1.15;}
    .card .d{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-top:3px;}
    .card .r{font-family:var(--mono);font-size:10px;color:var(--brass);font-weight:700;margin-top:2px;}
    .skelcard{aspect-ratio:2/3;border-radius:2px;background:linear-gradient(100deg,#e6dcc6 30%,#f1e9d8 50%,#e6dcc6 70%);background-size:200% 100%;animation:shimmer 1.2s ease-in-out infinite;}
    @keyframes shimmer{to{background-position:-200% 0;}}
    .spinner{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--vermillion);border-radius:50%;animation:spin .7s linear infinite;box-sizing:border-box;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .msg{font-family:var(--mono);font-size:12px;color:var(--ink-soft);padding:10px 2px;}
    .msg.err{color:var(--vermillion);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="/">← Search</a>
      <span class="brand">TBSI · Releases · Localhost</span>
    </div>
    <h1>In Cinemas &amp; Upcoming</h1>
    <div class="lede">Region: India (IN) · via TMDb</div>
    <div class="tabs">
      <div class="tab active" id="tabNow" data-k="now">Now in cinemas</div>
      <div class="tab" id="tabUp" data-k="up">Upcoming</div>
    </div>
    <div class="seclabel"><span id="secTitle">Now in cinemas</span><span class="count" id="count"></span></div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    async function getJson(url){ const r = await fetch(url); const d = await r.json().catch(()=>({error:"bad JSON"})); if(!r.ok) throw new Error(d.error||("HTTP "+r.status)); return d; }
    const cache = {};
    let cur = "now";
    const skeleton = () => `<div class="grid">${Array.from({length:12},()=>'<div class="skelcard"></div>').join("")}</div>`;

    function render(list){
      $("#count").textContent = list.length + " title" + (list.length===1?"":"s");
      if(!list.length){ $("#grid").innerHTML = `<div class="msg">Nothing listed right now.</div>`; return; }
      $("#grid").innerHTML = list.map(m=>{
        const p = m.posterUrl ? `<span class="p" style="background-image:url('${esc(m.posterUrl)}')"></span>` : `<span class="p empty">no poster</span>`;
        const rel = m.releaseDate ? m.releaseDate : (m.year||"");
        return `<a class="card" href="/movie.html?id=${m.id}">${p}<div class="m"><div class="t">${esc(m.title)}</div><div class="d">${esc(rel)}${m.language?" · "+esc(m.language):""}</div>${m.voteAverage?`<div class="r">★ ${m.voteAverage.toFixed(1)}</div>`:""}</div></a>`;
      }).join("");
    }

    async function load(k){
      cur = k;
      $("#tabNow").classList.toggle("active", k==="now");
      $("#tabUp").classList.toggle("active", k==="up");
      $("#secTitle").textContent = k==="up" ? "Upcoming" : "Now in cinemas";
      $("#count").textContent = "";
      if(cache[k]){ render(cache[k]); return; }
      $("#grid").innerHTML = Array.from({length:12},()=>'<div class="skelcard"></div>').join("");
      try{
        const path = k==="up" ? "/api/releases/upcoming" : "/api/releases/now-playing";
        const d = await getJson(path + "?region=IN");
        cache[k] = d.results || [];
        if(cur===k) render(cache[k]);
      }catch(e){ if(cur===k) $("#grid").innerHTML = `<div class="msg err">Couldn’t load: ${esc(e.message)}</div>`; }
    }

    $("#tabNow").addEventListener("click", ()=>load("now"));
    $("#tabUp").addEventListener("click", ()=>load("up"));
    load("now");
  </script>
  <script>
    if ("serviceWorker" in navigator) window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
  </script>
</body>
</html>
