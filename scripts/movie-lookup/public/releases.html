<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TBSI · In Cinemas &amp; Upcoming</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1A1614" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TBSI Lookup" />
  <link rel="canonical" href="https://thebigscreenindex.com/releases.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="The Big Screen Index" />
  <meta property="og:title" content="In Cinemas &amp; Upcoming · The Big Screen Index" />
  <meta property="og:description" content="What's in cinemas now and coming soon in India — posters, ratings, and language." />
  <meta property="og:image" content="https://thebigscreenindex.com/icon-512.png" />
  <meta property="og:url" content="https://thebigscreenindex.com/releases.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#1A1614; --cream:#F4ECDC; --vermillion:#A33223; --brass:#C49A3F;
      --bottle:#2E5742; --green:#2E5742; --oxblood:#682D25; --maroon:#581F16;
      --warm-cream:#FFEDDF; --gold-light:#F2D48A;
      --cream-60:rgba(244,236,220,.60); --cream-30:rgba(244,236,220,.30); --cream-12:rgba(244,236,220,.12);
      --panel:#211a16; --field:#1b1510; --thumb:#2a211b; --down:#D98A7C;
      --paper:#1A1614; --line:rgba(244,236,220,.12); --ink-soft:rgba(244,236,220,.60);
      --serif:"Space Grotesk",system-ui,sans-serif; --sans:"Inter",system-ui,sans-serif;
      --mono:"IBM Plex Mono",ui-monospace,Consolas,monospace;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{background:var(--ink);color:var(--cream);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    ::selection{background:rgba(242,212,138,.28);color:var(--ink);}
    :focus-visible{outline:2px solid var(--gold-light);outline-offset:3px;}
    @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;} *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition:none!important;}}
    .wrap{max-width:1120px;margin:0 auto;padding:22px 22px 90px;}
    a{color:var(--brass);} a:hover{color:var(--gold-light);}
    .topbar{position:sticky;top:0;z-index:60;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:rgba(26,22,20,.88);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid var(--cream-12);padding:12px 0;padding-top:calc(12px + env(safe-area-inset-top));margin-bottom:4px;}
    .back{font-family:var(--sans);font-size:13.5px;font-weight:500;letter-spacing:.01em;text-decoration:none;color:var(--cream-60);border:1px solid var(--cream-12);border-radius:100px;padding:7px 14px;cursor:pointer;transition:color .15s,border-color .15s;}
    .back:hover{color:var(--cream);border-color:var(--cream-30);}
    .brand{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-60);display:inline-flex;align-items:center;gap:8px;}
    .brand::before{content:"";width:10px;height:14px;background:var(--vermillion);border-radius:1px;flex:0 0 auto;}
    h1{font-family:var(--serif);font-weight:700;letter-spacing:-.02em;font-size:clamp(26px,5vw,40px);margin:18px 0 4px;color:var(--warm-cream);}
    .lede{font-family:var(--mono);font-size:11px;color:var(--cream-60);letter-spacing:.04em;margin-bottom:8px;}
    .tabs{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap;}
    .tab{font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.01em;padding:10px 18px;border:1px solid var(--cream-12);background:transparent;color:var(--cream-60);cursor:pointer;border-radius:100px;transition:color .15s,border-color .15s,background .15s;}
    .tab:hover{color:var(--cream);border-color:var(--cream-30);}
    .tab.active{background:var(--gold-light);color:var(--ink);border-color:var(--gold-light);}
    .langchips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px;}
    .lchip{font-family:var(--sans);font-size:12.5px;font-weight:500;letter-spacing:.01em;padding:8px 14px;border:1px solid var(--cream-12);background:transparent;color:var(--cream-60);cursor:pointer;border-radius:100px;transition:color .15s,border-color .15s,background .15s;}
    .lchip:hover{color:var(--cream);border-color:var(--cream-30);}
    .lchip.active{background:var(--gold-light);color:var(--ink);border-color:var(--gold-light);}
    .seclabel{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--brass);margin:10px 0 12px;border-bottom:1px solid var(--cream-12);padding-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
    .seclabel span:first-child{display:inline-flex;align-items:center;}
    .seclabel span:first-child::before{content:"";display:inline-block;width:22px;height:2px;background:var(--brass);margin-right:10px;flex:0 0 auto;}
    .seclabel .count{color:var(--cream-60);font-weight:400;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;}
    .card{cursor:pointer;border:1px solid var(--cream-12);background:var(--panel);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;display:block;transition:transform .15s,border-color .15s;}
    .card:hover{transform:translateY(-6px);border-color:var(--cream-30);}
    .card .p{aspect-ratio:2/3;background:var(--thumb) center/cover no-repeat;display:flex;align-items:center;justify-content:center;}
    .card .p.empty{font-family:var(--serif);font-weight:600;font-size:30px;color:var(--cream-30);}
    .card .m{padding:10px 11px 12px;}
    .card .t{font-family:var(--serif);font-weight:600;letter-spacing:-.01em;font-size:14px;line-height:1.15;color:var(--cream);}
    .card .d{font-family:var(--mono);font-size:10px;color:var(--cream-60);margin-top:4px;}
    .card .r{font-family:var(--mono);font-size:10px;color:var(--gold-light);font-weight:500;margin-top:3px;}
    .skelcard{aspect-ratio:2/3;border-radius:16px;background:linear-gradient(100deg,#241d18 30%,#31281f 50%,#241d18 70%);background-size:200% 100%;animation:shimmer 1.2s ease-in-out infinite;}
    @keyframes shimmer{to{background-position:-200% 0;}}
    .spinner{width:16px;height:16px;border:2px solid var(--cream-12);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;flex:0 0 auto;box-sizing:border-box;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .msg{font-family:var(--mono);font-size:12px;color:var(--cream-60);padding:10px 2px;}
    .msg.err{color:var(--down);}

    @media (max-width:520px){
      .wrap{padding:16px 14px 60px;}
      .brand{font-size:9px;letter-spacing:.14em;text-align:right;}
      h1{font-size:clamp(24px,7vw,34px);}
      .grid{grid-template-columns:repeat(2,1fr);gap:12px;}
      .tab{padding:10px 14px;}
    }
    /* Touch devices: no sticky hover-lift left applied after a tap. */
    @media (hover:none){ .card:hover{transform:none;} }

    /* Touch devices (phones/tablets): guarantee ~44px minimum tap targets.
       Scoped to pointer:coarse so the confirmed mouse/desktop layout is unchanged. */
    @media (pointer:coarse){
      .back,.savebtn,.tab,.fbtn,.lchip,.nav a,.rawbar button,.chosen .cx,.seeall{display:inline-flex;align-items:center;justify-content:center;min-height:44px;}
      .fsort{min-height:44px;}
      .crewrow{min-height:44px;}
      .rm{min-height:40px;display:inline-flex;align-items:center;}
      a.link{display:inline-block;padding:5px 0;}
      .feed .seclabel{align-items:center;}
      .lb a,.lb button{min-height:44px;}
      .lb .nav{min-width:44px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="/">← Search</a>
      <span class="brand" id="brand">TBSI · Releases</span>
    </div>
    <h1>In Cinemas &amp; Upcoming</h1>
    <div class="lede">Region: India (IN) · via TMDb</div>
    <div class="tabs">
      <div class="tab active" id="tabNow" data-k="now">Now in cinemas</div>
      <div class="tab" id="tabUp" data-k="up">Upcoming</div>
    </div>
    <div class="langchips" id="langChips"></div>
    <div class="seclabel"><span id="secTitle">Now in cinemas</span><span class="count" id="count"></span></div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    // The "· Localhost" brand suffix shows only on a local dev host, never on the deployed site.
    const IS_LOCAL = ["localhost","127.0.0.1"].includes(location.hostname);
    // Neutral empty-thumb monogram: the title's first letter (consistent across pages).
    const initial = (s) => { const t = String(s ?? "").trim(); return t ? esc(t[0].toUpperCase()) : "·"; };
    if (IS_LOCAL) { const b = document.getElementById("brand"); if (b) b.append(" · Localhost"); }
    async function getJson(url){ const r = await fetch(url); const d = await r.json().catch(()=>({error:"bad JSON"})); if(!r.ok) throw new Error(d.error||("HTTP "+r.status)); return d; }
    const cache = {};
    let cur = "now";

    // ── Feed language filter (chips) ──
    // Single-select; default "Indian" (te/ta/hi/ml/kn/mr/bn/pa); persisted in localStorage
    // (key shared with the home page). Filters the already-fetched list client-side.
    const INDIAN_ISOS = new Set(["te","ta","hi","ml","kn","mr","bn","pa"]);
    const FEED_LANGS = [
      { key:"indian", label:"Indian" }, { key:"te", label:"Telugu" }, { key:"ta", label:"Tamil" },
      { key:"hi", label:"Hindi" }, { key:"ml", label:"Malayalam" }, { key:"kn", label:"Kannada" }, { key:"all", label:"All" },
    ];
    let feedLang = "indian";
    try { const s = localStorage.getItem("tbsi_feed_lang"); if (s && FEED_LANGS.some(l=>l.key===s)) feedLang = s; } catch(e){}
    const langLabel = () => (FEED_LANGS.find(l=>l.key===feedLang)||{}).label || "";
    function langMatches(m){ if(feedLang==="all") return true; if(feedLang==="indian") return INDIAN_ISOS.has(m.languageIso); return m.languageIso===feedLang; }
    function filterByLang(list){ return list.filter(langMatches); }
    function buildLangChips(){
      const el = $("#langChips");
      el.innerHTML = FEED_LANGS.map(l=>`<button class="lchip${l.key===feedLang?" active":""}" data-k="${l.key}">${l.label}</button>`).join("");
      el.querySelectorAll(".lchip").forEach(b=>b.addEventListener("click", ()=>{
        feedLang = b.dataset.k;
        try { localStorage.setItem("tbsi_feed_lang", feedLang); } catch(e){}
        el.querySelectorAll(".lchip").forEach(x=>x.classList.toggle("active", x===b));
        if (cache[cur]) render(cache[cur]);
      }));
    }

    function render(list){
      const filtered = filterByLang(list);
      $("#count").textContent = filtered.length + " title" + (filtered.length===1?"":"s");
      if(!filtered.length){ $("#grid").innerHTML = list.length ? `<div class="msg">No ${esc(langLabel())} titles in this window — try All.</div>` : `<div class="msg">Nothing listed right now.</div>`; return; }
      $("#grid").innerHTML = filtered.map(m=>{
        const p = m.posterUrl ? `<span class="p" style="background-image:url('${esc(m.posterUrl)}')"></span>` : `<span class="p empty">${initial(m.title)}</span>`;
        const rel = m.releaseDate ? m.releaseDate : (m.year||"");
        return `<a class="card" href="/movie.html?id=${m.id}">${p}<div class="m"><div class="t">${esc(m.title)}</div><div class="d">${esc(rel)}${m.language?" · "+esc(m.language):""}</div>${m.voteAverage?`<div class="r">★ ${m.voteAverage.toFixed(1)}</div>`:""}</div></a>`;
      }).join("");
    }

    async function load(k){
      cur = k;
      $("#tabNow").classList.toggle("active", k==="now");
      $("#tabUp").classList.toggle("active", k==="up");
      $("#secTitle").textContent = k==="up" ? "Upcoming" : "Now in cinemas";
      $("#count").textContent = "";
      if(cache[k]){ render(cache[k]); return; }
      $("#grid").innerHTML = Array.from({length:12},()=>'<div class="skelcard"></div>').join("");
      try{
        const path = k==="up" ? "/api/releases/upcoming" : "/api/releases/now-playing";
        const d = await getJson(path + "?region=IN");
        cache[k] = d.results || [];
        if(cur===k) render(cache[k]);
      }catch(e){ if(cur===k) $("#grid").innerHTML = `<div class="msg err">Couldn’t load: ${esc(e.message)}</div>`; }
    }

    $("#tabNow").addEventListener("click", ()=>load("now"));
    $("#tabUp").addEventListener("click", ()=>load("up"));
    buildLangChips();
    load("now");
  </script>
  <script>
    if ("serviceWorker" in navigator) window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
  </script>
  <!-- Privacy-friendly analytics (GoatCounter). count.js self-skips localhost. -->
  <script data-goatcounter="https://thebigscreenindex.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
