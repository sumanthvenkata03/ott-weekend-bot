<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>TBSI · Person</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1A1614" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TBSI Lookup" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#1A1614; --cream:#F4ECDC; --vermillion:#A33223; --brass:#C49A3F;
      --bottle:#2E5742; --green:#2E5742; --oxblood:#682D25; --maroon:#581F16;
      --warm-cream:#FFEDDF; --gold-light:#F2D48A;
      --cream-60:rgba(244,236,220,.60); --cream-30:rgba(244,236,220,.30); --cream-12:rgba(244,236,220,.12);
      --panel:#211a16; --field:#1b1510; --thumb:#2a211b; --down:#D98A7C;
      --paper:#1A1614; --line:rgba(244,236,220,.12); --ink-soft:rgba(244,236,220,.60);
      --serif:"Space Grotesk",system-ui,sans-serif; --sans:"Inter",system-ui,sans-serif;
      --mono:"IBM Plex Mono",ui-monospace,Consolas,monospace;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{background:var(--ink);color:var(--cream);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    ::selection{background:rgba(242,212,138,.28);color:var(--ink);}
    :focus-visible{outline:2px solid var(--gold-light);outline-offset:3px;}
    @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;} *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition:none!important;}}
    .wrap{max-width:1120px;margin:0 auto;padding:22px 22px 90px;}
    a{color:var(--brass);} a:hover{color:var(--gold-light);}
    .topbar{position:sticky;top:0;z-index:60;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:rgba(26,22,20,.88);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid var(--cream-12);padding:12px 0;padding-top:calc(12px + env(safe-area-inset-top));margin-bottom:4px;}
    .back{font-family:var(--sans);font-size:13.5px;font-weight:500;letter-spacing:.01em;text-decoration:none;color:var(--cream-60);border:1px solid var(--cream-12);border-radius:100px;padding:7px 14px;cursor:pointer;transition:color .15s,border-color .15s;}
    .back:hover{color:var(--cream);border-color:var(--cream-30);}
    .brand{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-60);display:inline-flex;align-items:center;gap:8px;}
    .brand::before{content:"";width:10px;height:14px;background:var(--vermillion);border-radius:1px;flex:0 0 auto;}
    .status{text-align:center;font-family:var(--mono);font-size:12px;color:var(--cream-60);min-height:18px;margin:18px 0;}
    .status.err{color:var(--down);font-weight:500;}

    .seclabel{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--brass);margin:36px 0 16px;border-bottom:1px solid var(--cream-12);padding-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
    .seclabel span:first-child{display:inline-flex;align-items:center;}
    .seclabel span:first-child::before{content:"";display:inline-block;width:22px;height:2px;background:var(--brass);margin-right:10px;flex:0 0 auto;}
    .seclabel .count{color:var(--cream-60);font-weight:400;text-align:right;}

    .phead{display:grid;grid-template-columns:220px 1fr;gap:28px;margin-top:18px;}
    @media (max-width:640px){.phead{grid-template-columns:1fr;}}
    .ppic{width:100%;border:1px solid var(--cream-12);border-radius:16px;background:var(--thumb);display:block;}
    .phead h1{font-family:var(--serif);font-weight:700;letter-spacing:-.02em;font-size:clamp(28px,5vw,44px);line-height:1.02;margin:0 0 8px;color:var(--warm-cream);}
    .pmeta{font-family:var(--mono);font-size:12px;color:var(--cream);line-height:1.9;}
    .pmeta b{color:var(--brass);font-weight:500;}
    .bio{font-family:var(--sans);font-size:15.5px;line-height:1.65;margin-top:14px;color:var(--cream);}
    .idrow{margin-top:14px;display:flex;gap:16px;flex-wrap:wrap;}
    a.link{color:var(--brass);text-decoration:none;border-bottom:1px solid var(--cream-30);font-family:var(--mono);font-size:12px;}
    a.link:hover{color:var(--gold-light);border-color:var(--gold-light);}
    .savebtn{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.01em;padding:9px 18px;border-radius:100px;cursor:pointer;border:1px solid var(--brass);background:transparent;color:var(--gold-light);margin-top:12px;transition:background .15s,color .15s,border-color .15s;}
    .savebtn:hover{border-color:var(--gold-light);}
    .savebtn.on{background:var(--gold-light);color:var(--ink);border-color:var(--gold-light);}
    .savebtn:disabled{opacity:.6;cursor:default;}
    .fcontrols{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 14px;}
    .fbtn{font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.01em;padding:8px 14px;border:1px solid var(--cream-12);background:transparent;border-radius:100px;cursor:pointer;color:var(--cream-60);transition:color .15s,border-color .15s,background .15s;}
    .fbtn:hover{color:var(--cream);border-color:var(--cream-30);}
    .fbtn.active{background:var(--gold-light);color:var(--ink);border-color:var(--gold-light);}
    .fsort{font-family:var(--mono);font-size:12px;padding:8px 12px;border:1px solid var(--cream-12);background:var(--field);border-radius:100px;color:var(--cream);cursor:pointer;}
    .fsort option{background:var(--panel);color:var(--cream);}
    .fsep{flex:1 1 8px;min-width:8px;}

    .filmo{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px;}
    .film{border:1px solid var(--cream-12);background:var(--panel);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;display:block;transition:transform .15s,border-color .15s;}
    .film.clickable{cursor:pointer;} .film.clickable:hover{transform:translateY(-6px);border-color:var(--cream-30);}
    .film .fp{aspect-ratio:2/3;background:var(--thumb) center/cover no-repeat;display:flex;align-items:center;justify-content:center;}
    .film .fp.empty{font-family:var(--serif);font-weight:600;font-size:26px;color:var(--cream-30);text-align:center;padding:6px;}
    .film .fm{padding:9px 10px 11px;}
    .film .ft{font-family:var(--serif);font-weight:600;letter-spacing:-.01em;font-size:14px;line-height:1.15;color:var(--cream);}
    .film .fr{font-family:var(--mono);font-size:10px;color:var(--cream-60);margin-top:3px;}
    .film .fbadge{display:inline-block;font-family:var(--mono);font-size:8px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:100px;margin-top:6px;border:1px solid var(--brass);background:rgba(196,154,63,.18);color:var(--gold-light);}

    .tabs{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap;}
    .tab{font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.01em;padding:8px 16px;border:1px solid var(--cream-12);background:transparent;color:var(--cream-60);cursor:pointer;border-radius:100px;transition:color .15s,border-color .15s,background .15s;}
    .tab:hover{color:var(--cream);border-color:var(--cream-30);}
    .tab.active{background:var(--gold-light);color:var(--ink);border-color:var(--gold-light);}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}
    .gimg{position:relative;border:1px solid var(--cream-12);border-radius:16px;overflow:hidden;background:var(--thumb);cursor:pointer;transition:transform .15s,border-color .15s;}
    .gimg:hover{transform:translateY(-6px);border-color:var(--cream-30);}
    .gimg img{width:100%;display:block;}
    .gimg .src{position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;background:rgba(46,87,66,.9);color:var(--cream);padding:3px 8px;border-radius:100px;}
    .gimg .src.still{background:var(--oxblood);}
    .gimg .ctx{position:absolute;top:8px;left:8px;right:40px;font-family:var(--mono);font-size:9px;font-weight:500;background:rgba(26,22,20,.82);color:var(--cream);padding:3px 8px;border-radius:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .gimg .dim{position:absolute;bottom:8px;right:8px;font-family:var(--mono);font-size:9px;background:rgba(26,22,20,.82);color:var(--cream);padding:3px 8px;border-radius:100px;}

    .spinner{width:16px;height:16px;border:2px solid var(--cream-12);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;flex:0 0 auto;box-sizing:border-box;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--cream-60);padding:14px 2px;}
    .loading.err{color:var(--down);}
    .skelcard{aspect-ratio:2/3;border-radius:16px;background:linear-gradient(100deg,#241d18 30%,#31281f 50%,#241d18 70%);background-size:200% 100%;animation:shimmer 1.2s ease-in-out infinite;}
    @keyframes shimmer{to{background-position:-200% 0;}}
    .wakebanner{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);display:flex;align-items:center;gap:10px;background:var(--panel);color:var(--cream);font-family:var(--mono);font-size:12px;letter-spacing:.03em;padding:12px 18px;border-radius:100px;border:1px solid var(--brass);box-shadow:0 12px 40px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:200;}
    .wakebanner.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .wakebanner::before{content:"";width:14px;height:14px;border:2px solid var(--cream-30);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;box-sizing:border-box;}
    .lb{position:fixed;inset:0;background:rgba(16,12,10,.94);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:120;padding:24px;padding-bottom:calc(24px + env(safe-area-inset-bottom));}
    .lb.open{display:flex;}
    .lb img{max-width:92vw;max-height:76vh;border:1px solid var(--cream-30);border-radius:8px;box-shadow:0 24px 70px rgba(0,0,0,.7);}
    .lb .bar{display:flex;gap:12px;margin-top:16px;align-items:center;flex-wrap:wrap;justify-content:center;}
    .lb a,.lb button{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.01em;padding:10px 18px;border-radius:100px;cursor:pointer;text-decoration:none;border:1px solid var(--cream-30);color:var(--cream);background:transparent;transition:background .15s,border-color .15s,color .15s;}
    .lb .dl{background:var(--gold-light);color:var(--ink);border-color:var(--gold-light);}
    .lb .dl:hover{background:var(--warm-cream);border-color:var(--warm-cream);}
    .lb .open2:hover{border-color:var(--cream);}
    .lb .close{background:var(--vermillion);color:var(--cream);border-color:var(--vermillion);}
    .lb .close:hover{background:var(--oxblood);border-color:var(--oxblood);}
    .lb .counter{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.1em;color:var(--cream-60);padding:10px 6px;border:none;background:none;}
    .lb .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:2;width:52px;height:74px;display:flex;align-items:center;justify-content:center;padding:0;font-family:var(--serif);font-size:34px;line-height:1;font-weight:600;background:rgba(26,22,20,.6);color:var(--cream);border:1px solid var(--cream-30);border-radius:100px;cursor:pointer;transition:background .15s,border-color .15s;}
    .lb .nav:hover{background:var(--panel);border-color:var(--gold-light);}
    .lb .nav.prev{left:18px;} .lb .nav.next{right:18px;}
    @media (max-width:640px){.lb .nav{width:44px;height:60px;font-size:28px;} .lb .nav.prev{left:6px;} .lb .nav.next{right:6px;}}
    .lb .cap{font-family:var(--mono);font-size:11px;color:var(--cream-60);margin-top:8px;}

    @media (max-width:520px){
      .wrap{padding:16px 14px 60px;}
      .brand{font-size:9px;letter-spacing:.14em;}
      .phead{gap:16px;}
      .ppic{max-width:190px;}
      .phead h1{font-size:clamp(26px,8vw,40px);}
      .seclabel{margin:28px 0 14px;}
      .tab{padding:10px 16px;}
      .filmo{gap:10px;}
      .grid{gap:10px;}
      .lb{padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom));}
      .lb img{max-width:94vw;max-height:64vh;}
      .lb .bar{gap:8px;margin-top:12px;}
      .lb a,.lb button{font-size:12px;padding:9px 14px;letter-spacing:.01em;}
    }
    .hidden{display:none!important;}
    /* Touch devices: no sticky hover-lift left applied after a tap. */
    @media (hover:none){ .film.clickable:hover,.gimg:hover{transform:none;} }
    /* Touch devices (phones/tablets): guarantee ~44px minimum tap targets.
       Scoped to pointer:coarse so the confirmed mouse/desktop layout is unchanged. */
    @media (pointer:coarse){
      .back,.savebtn,.tab,.fbtn,.nav a,.rawbar button,.chosen .cx,.seeall{display:inline-flex;align-items:center;justify-content:center;min-height:44px;}
      .fsort{min-height:44px;}
      .crewrow{min-height:44px;}
      .rm{min-height:40px;display:inline-flex;align-items:center;}
      a.link{display:inline-block;padding:5px 0;}
      .feed .seclabel{align-items:center;}
      .lb a,.lb button{min-height:44px;}
      .lb .nav{min-width:44px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" id="back">← Back</a>
      <span class="brand" id="brand">TBSI · Person</span>
    </div>
    <div class="status" id="status">Loading…</div>
    <div id="body" class="hidden"></div>
  </div>

  <div class="lb" id="lb">
    <button class="nav prev" id="lbPrev" aria-label="Previous image">‹</button>
    <img id="lbImg" alt="" />
    <button class="nav next" id="lbNext" aria-label="Next image">›</button>
    <div class="bar">
      <span class="counter" id="lbCounter"></span>
      <a class="dl" id="lbDownload" href="#">Download full-res</a>
      <a class="open2" id="lbOpen" href="#" target="_blank" rel="noopener">Open original ↗</a>
      <button class="close" id="lbClose">Close ✕</button>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    // The "· Localhost" brand suffix shows only on a local dev host, never on the deployed site.
    const IS_LOCAL = ["localhost","127.0.0.1"].includes(location.hostname);
    // Neutral empty-thumb monogram: the title/name's first letter (consistent across pages).
    const initial = (s) => { const t = String(s ?? "").trim(); return t ? esc(t[0].toUpperCase()) : "·"; };
    // Per-device watchlist id: a stable random id kept in localStorage and sent as the
    // X-TBSI-Device header, so each device (phone, laptop) keeps its own saved list.
    const DEVICE_ID = (() => {
      try {
        let id = localStorage.getItem("tbsi_device_id");
        if (!id || !/^[A-Za-z0-9-]{8,64}$/.test(id)) {
          id = (crypto && crypto.randomUUID) ? crypto.randomUUID()
             : Array.from({ length: 32 }, () => Math.floor(Math.random() * 16).toString(16)).join("");
          localStorage.setItem("tbsi_device_id", id);
        }
        return id;
      } catch (e) { return "legacy"; } // private mode / storage blocked → shared bucket
    })();
    const deviceHeaders = () => ({ "X-TBSI-Device": DEVICE_ID });
    const statusEl = $("#status");
    function setStatus(m, err){ statusEl.textContent = m||""; statusEl.classList.toggle("err", !!err); statusEl.classList.toggle("hidden", !m); }
    const id = new URLSearchParams(location.search).get("id");
    if (IS_LOCAL) { const b = document.getElementById("brand"); if (b) b.append(" · Localhost"); }
    $("#back").addEventListener("click", () => history.length > 1 ? history.back() : (location.href = "/"));

    async function getJson(url, opts){ const r = await fetch(url, opts); const d = await r.json().catch(()=>({error:"bad JSON"})); if(!r.ok) throw new Error(d.error||("HTTP "+r.status)); return d; }

    // ── Cold-start "waking up" banner: shown while a tracked fetch runs >3s. ──
    let _pending = 0, _wakeTimer = null, _wakeEl = null;
    function wakeShow(){ if(!_wakeEl){ _wakeEl=document.createElement("div"); _wakeEl.className="wakebanner"; _wakeEl.textContent="Server waking up, one moment…"; document.body.appendChild(_wakeEl); } requestAnimationFrame(()=>_wakeEl.classList.add("show")); }
    function wakeHide(){ if(_wakeEl) _wakeEl.classList.remove("show"); }
    async function trackedFetch(url){
      _pending++;
      if(!_wakeTimer) _wakeTimer=setTimeout(wakeShow, 3000);
      try { return await getJson(url); }
      finally { if(--_pending<=0){ clearTimeout(_wakeTimer); _wakeTimer=null; wakeHide(); } }
    }

    // Skeleton shown while the (single) person request is in flight — profile +
    // filmography + gallery all arrive together, so one loading state covers them.
    function showLoading(){
      $("#body").innerHTML = `
        <div class="phead">
          <div><div class="ppic skelcard"></div></div>
          <div><div class="loading"><span class="spinner"></span>Loading profile, filmography &amp; gallery…</div></div>
        </div>
        <div class="seclabel"><span>Image Gallery</span></div>
        <div class="grid">${Array.from({length:8},()=>'<div class="skelcard"></div>').join("")}</div>`;
      $("#body").classList.remove("hidden");
    }

    let IMAGES = [];
    (async function init(){
      if (!id) { setStatus("No person id in URL.", true); return; }
      showLoading();
      try {
        const p = await trackedFetch("/api/person/" + encodeURIComponent(id));
        document.title = "TBSI · " + p.name;
        render(p);
        setStatus("");
      } catch (e) { $("#body").classList.add("hidden"); setStatus("Failed to load: " + e.message, true); }
    })();

    function render(p){
      IMAGES = p.images || [];
      const pic = p.profileUrl ? `<img class="ppic" src="${esc(p.profileUrl)}" alt="" />` : `<div class="ppic" style="aspect-ratio:2/3"></div>`;

      const meta = [];
      if (p.knownForDepartment) meta.push(`Known for <b>${esc(p.knownForDepartment)}</b>`);
      if (p.birthday) meta.push(`Born ${esc(p.birthday)}${p.age!=null && !p.ageAtDeath ? ` · age <b>${p.age}</b>` : ""}`);
      if (p.placeOfBirth) meta.push(esc(p.placeOfBirth));
      if (p.deathday) meta.push(`Died ${esc(p.deathday)}${p.age!=null && p.ageAtDeath ? ` · age at death <b>${p.age}</b>` : ""}`);
      if (p.gender) meta.push(esc(p.gender));
      if (p.alsoKnownAs && p.alsoKnownAs.length) meta.push(`a.k.a. ${esc(p.alsoKnownAs.slice(0,4).join(", "))}`);

      const ids = [`<a class="link" href="https://www.themoviedb.org/person/${p.id}" target="_blank" rel="noopener">TMDb ${p.id} ↗</a>`];
      if (p.imdbId) ids.push(`<a class="link" href="https://www.imdb.com/name/${esc(p.imdbId)}" target="_blank" rel="noopener">${esc(p.imdbId)} ↗</a>`);
      if (p.homepage) ids.push(`<a class="link" href="${esc(p.homepage)}" target="_blank" rel="noopener">Homepage ↗</a>`);

      FILMO = p.filmography || [];

      $("#body").innerHTML = `
        <div class="phead">
          <div>${pic}</div>
          <div>
            <h1>${esc(p.name)}</h1>
            <div class="pmeta">${meta.join("<br>")}</div>
            <div class="idrow">${ids.join("")}</div>
            <button class="savebtn" id="saveBtn">☆ Save</button>
            ${p.biography?`<div class="bio">${esc(p.biography)}</div>`:""}
          </div>
        </div>

        <div class="seclabel"><span>Filmography</span><span class="count" id="filmoCount"></span></div>
        <div class="fcontrols">
          <div class="fgroup" id="filmoFilters">
            <button class="fbtn active" data-f="all">All</button>
            <button class="fbtn" data-f="acting">Acting</button>
            <button class="fbtn" data-f="directing">Directing</button>
            <button class="fbtn" data-f="crew">Crew</button>
          </div>
          <span class="fsep"></span>
          <select class="fsort" id="filmoSort">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="popular">Most popular</option>
          </select>
        </div>
        <div class="filmo" id="filmoGrid"></div>

        <div class="seclabel"><span>Image Gallery</span><span class="count" id="galCount"></span></div>
        <div class="tabs" id="galTabs">
          <div class="tab active" data-f="all">All</div>
          <div class="tab" data-f="portrait">Portraits</div>
          <div class="tab" data-f="still">Film stills</div>
        </div>
        <div class="grid" id="galGrid"></div>`;
      $("#body").classList.remove("hidden");
      setupGallery(p);
      wireFilmo();
      initSave(p);
    }

    // ── Filmography sort + filter (client-side; mirror of compute.ts) ──
    let FILMO = [], F_SORT = "newest", F_FILTER = "all";
    function sortFilmography(items, sort){
      const c = items.slice();
      if (sort === "newest") c.sort((a,b)=>(b.year||0)-(a.year||0));
      else if (sort === "oldest") c.sort((a,b)=>(a.year||Infinity)-(b.year||Infinity));
      else if (sort === "popular") c.sort((a,b)=>(b.popularity||0)-(a.popularity||0));
      return c;
    }
    function filterFilmography(items, filter){
      if (filter === "all") return items.slice();
      if (filter === "acting") return items.filter(f=>f.department==="cast");
      if (filter === "crew") return items.filter(f=>f.department==="crew");
      return items.filter(f=>f.department==="crew" && /direct/i.test(f.role||""));
    }
    function renderFilmo(){
      const list = sortFilmography(filterFilmography(FILMO, F_FILTER), F_SORT);
      $("#filmoCount").textContent = list.length + " of " + FILMO.length + " title" + (FILMO.length===1?"":"s");
      $("#filmoGrid").innerHTML = list.length ? list.map(f=>{
        const clickable = f.mediaType === "movie";
        const poster = f.posterUrl ? `<span class="fp" style="background-image:url('${esc(f.posterUrl)}')"></span>` : `<span class="fp empty">${initial(f.title)}</span>`;
        const inner = `${poster}<div class="fm"><div class="ft">${esc(f.title)}</div><div class="fr">${esc(f.year||"—")} · ${esc(f.role)}</div><span class="fbadge">${esc(f.mediaType)}</span></div>`;
        return clickable ? `<a class="film clickable" href="/movie.html?id=${f.id}">${inner}</a>` : `<div class="film">${inner}</div>`;
      }).join("") : `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No titles in this view.</div>`;
    }
    function wireFilmo(){
      $("#filmoFilters").querySelectorAll(".fbtn").forEach(b=> b.addEventListener("click", ()=>{
        F_FILTER = b.dataset.f;
        $("#filmoFilters").querySelectorAll(".fbtn").forEach(x=>x.classList.toggle("active", x===b));
        renderFilmo();
      }));
      $("#filmoSort").addEventListener("change", (e)=>{ F_SORT = e.target.value; renderFilmo(); });
      renderFilmo();
    }

    // ── Watchlist "☆ Save / ★ Saved" toggle ──
    async function initSave(p){
      const btn = $("#saveBtn"); if(!btn) return;
      let saved = false;
      try { const w = await getJson("/api/watchlist", { headers: deviceHeaders() }); saved = (w.items||[]).some(i=>i.type==="person" && String(i.tmdbId)===String(p.id)); } catch(e){ /* best-effort */ }
      const paint = ()=>{ btn.textContent = saved ? "★ Saved" : "☆ Save"; btn.classList.toggle("on", saved); };
      paint();
      btn.addEventListener("click", async ()=>{
        btn.disabled = true;
        try {
          if (saved){ await fetch(`/api/watchlist/person/${p.id}`, { method:"DELETE", headers: deviceHeaders() }); saved = false; }
          else { await fetch("/api/watchlist", { method:"POST", headers:{"Content-Type":"application/json", ...deviceHeaders()}, body: JSON.stringify({ type:"person", id:p.id, title:p.name }) }); saved = true; }
          paint();
        } catch(e){ } finally { btn.disabled = false; }
      });
    }

    let GALFILTER = "all";
    function setupGallery(p){
      const st = p.imageStats || { portraits: 0, stills: 0, stillFilms: 0 };
      // hide empty tabs
      $("#galTabs").querySelector('[data-f="portrait"]').style.display = st.portraits ? "" : "none";
      $("#galTabs").querySelector('[data-f="still"]').style.display = st.stills ? "" : "none";
      $("#galTabs").querySelectorAll(".tab").forEach(t=> t.addEventListener("click", ()=>{
        GALFILTER = t.dataset.f;
        $("#galTabs").querySelectorAll(".tab").forEach(x=>x.classList.toggle("active", x===t));
        renderGallery(p);
      }));
      renderGallery(p);
    }
    function renderGallery(p){
      const st = p.imageStats || { portraits: 0, stills: 0, stillFilms: 0 };
      const picks = IMAGES.map((im,i)=>({im,i})).filter(({im})=>
        GALFILTER==="all" ? true : GALFILTER==="still" ? im.kind==="still" : im.kind!=="still");
      $("#galCount").textContent =
        `${IMAGES.length} total · ${st.portraits} portraits · ${st.stills} film stills` +
        (st.stillFilms?` (from ${st.stillFilms} films)`:"") +
        ((p.imageSources||[]).length?`  ·  ${p.imageSources.join(", ")}`:"");
      const grid = $("#galGrid");
      grid.innerHTML = picks.length
        ? picks.map(({im,i})=>`<div class="gimg" data-i="${i}">
            <img loading="lazy" src="${esc(im.thumbUrl)}" alt=""/>
            <span class="src ${im.kind==='still'?'still':''}">${esc(im.source)}</span>
            ${im.kind==='still'&&im.context?`<span class="ctx">still · ${esc(im.context)}</span>`:""}
            ${im.width?`<span class="dim">${im.width}×${im.height}</span>`:""}
          </div>`).join("")
        : `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No images in this view.</div>`;
      // The lightbox slideshow cycles the CURRENTLY VISIBLE (filtered) set, in
      // grid order — so arrows stay within the active tab (All / Portraits /
      // Film stills). Open by grid position within this filtered view.
      LB_LIST = picks.map(x=>x.im);
      grid.querySelectorAll(".gimg").forEach((el,pos)=> el.addEventListener("click", ()=> openLbAt(LB_LIST, pos)));
    }

    // ── Lightbox slideshow (prev/next over the active tab's filtered set) ──
    // Wrap-around: after the last image Next goes to the first, and Prev from
    // the first goes to the last.
    let LB_LIST = [], LB_INDEX = 0;
    function openLbAt(list, i){
      if (!list || !list.length) return;
      LB_LIST = list;
      LB_INDEX = ((i % list.length) + list.length) % list.length;
      showLb();
      $("#lb").classList.add("open");
    }
    function showLb(){
      const im = LB_LIST[LB_INDEX]; if (!im) return;
      $("#lbImg").src = im.fullUrl; $("#lbOpen").href = im.fullUrl;
      $("#lbDownload").href = "/api/download?url=" + encodeURIComponent(im.fullUrl);
      const multi = LB_LIST.length > 1;
      $("#lbCounter").textContent = multi ? (LB_INDEX + 1) + " / " + LB_LIST.length : "";
      $("#lbPrev").classList.toggle("hidden", !multi);
      $("#lbNext").classList.toggle("hidden", !multi);
      preloadNext();
    }
    function navLb(dir){
      if (LB_LIST.length < 2) return;
      LB_INDEX = (LB_INDEX + dir + LB_LIST.length) % LB_LIST.length;
      showLb();
    }
    function preloadNext(){
      if (LB_LIST.length < 2) return;
      const n = LB_LIST[(LB_INDEX + 1) % LB_LIST.length];
      if (n && n.fullUrl){ const img = new Image(); img.src = n.fullUrl; }
    }
    function closeLb(){ $("#lb").classList.remove("open"); $("#lbImg").src=""; }
    $("#lbClose").addEventListener("click", closeLb);
    $("#lbPrev").addEventListener("click", e=>{ e.stopPropagation(); navLb(-1); });
    $("#lbNext").addEventListener("click", e=>{ e.stopPropagation(); navLb(1); });
    $("#lb").addEventListener("click", e=>{ if(e.target===$("#lb")) closeLb(); });
    document.addEventListener("keydown", e=>{
      if (!$("#lb").classList.contains("open")) return;
      if (e.key === "Escape") closeLb();
      else if (e.key === "ArrowLeft"){ e.preventDefault(); navLb(-1); }
      else if (e.key === "ArrowRight"){ e.preventDefault(); navLb(1); }
    });
    // Touch swipe: left-swipe = Next, right-swipe = Prev.
    let lbTsX = 0, lbTsY = 0;
    $("#lb").addEventListener("touchstart", e=>{ if(e.touches.length===1){ lbTsX=e.touches[0].clientX; lbTsY=e.touches[0].clientY; } }, {passive:true});
    $("#lb").addEventListener("touchend", e=>{
      const t = e.changedTouches[0]; if(!t) return;
      const dx = t.clientX - lbTsX, dy = t.clientY - lbTsY;
      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) navLb(dx < 0 ? 1 : -1);
    }, {passive:true});
  </script>
  <script>
    // PWA: register the app-shell service worker (installable + offline shell).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
    }
  </script>
</body>
