<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>TBSI · Person</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:#1A1614; --cream:#F4ECDC; --vermillion:#A33223; --brass:#C49A3F;
      --green:#2E5742; --oxblood:#682D25; --maroon:#581F16; --paper:#F4ECDC;
      --line:rgba(26,22,20,0.28); --ink-soft:rgba(26,22,20,0.66);
      --serif:"Playfair Display",Georgia,serif; --sans:"Inter",system-ui,sans-serif;
      --mono:"JetBrains Mono",ui-monospace,Consolas,monospace;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;
      background-image:radial-gradient(rgba(104,45,37,0.04) 1px,transparent 1px);background-size:4px 4px;}
    .wrap{max-width:1120px;margin:0 auto;padding:22px 22px 90px;}
    a{color:var(--vermillion);}
    .topbar{display:flex;justify-content:space-between;align-items:center;border-bottom:3px double var(--ink);padding-bottom:10px;}
    .back{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:var(--oxblood);cursor:pointer;}
    .back:hover{color:var(--vermillion);}
    .brand{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);}
    .status{text-align:center;font-family:var(--mono);font-size:12px;color:var(--ink-soft);min-height:18px;margin:18px 0;}
    .status.err{color:var(--vermillion);font-weight:700;}

    .seclabel{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--oxblood);margin:34px 0 14px;border-bottom:1px solid var(--line);padding-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;}
    .seclabel .count{color:var(--ink-soft);font-weight:500;}

    .phead{display:grid;grid-template-columns:220px 1fr;gap:28px;margin-top:18px;}
    @media (max-width:640px){.phead{grid-template-columns:1fr;}}
    .ppic{width:100%;border:1px solid var(--ink);border-radius:2px;background:#e6dcc6;display:block;}
    .phead h1{font-family:var(--serif);font-weight:900;font-size:clamp(28px,5vw,44px);line-height:1.02;margin:0 0 6px;}
    .pmeta{font-family:var(--mono);font-size:12px;color:var(--ink);line-height:1.9;}
    .pmeta b{color:var(--vermillion);}
    .bio{font-family:var(--serif);font-size:16px;line-height:1.6;margin-top:14px;}
    .idrow{margin-top:12px;display:flex;gap:16px;flex-wrap:wrap;}
    a.link{color:var(--vermillion);text-decoration:none;border-bottom:1px solid rgba(163,50,35,.4);font-family:var(--mono);font-size:12px;}

    .filmo{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;}
    .film{border:1px solid var(--line);background:#fbf6ea;border-radius:2px;overflow:hidden;text-decoration:none;color:inherit;display:block;transition:transform .08s,border-color .08s;}
    .film.clickable{cursor:pointer;} .film.clickable:hover{transform:translateY(-2px);border-color:var(--vermillion);}
    .film .fp{aspect-ratio:2/3;background:#e6dcc6 center/cover no-repeat;display:flex;align-items:center;justify-content:center;}
    .film .fp.empty{font-family:var(--mono);font-size:9px;color:var(--ink-soft);text-align:center;padding:6px;}
    .film .fm{padding:7px 8px 9px;}
    .film .ft{font-family:var(--serif);font-weight:700;font-size:13px;line-height:1.15;}
    .film .fr{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-top:3px;}
    .film .fbadge{display:inline-block;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cream);background:var(--brass);padding:1px 4px;border-radius:2px;margin-top:4px;}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
    .gimg{position:relative;border:1px solid var(--line);border-radius:2px;overflow:hidden;background:#e6dcc6;cursor:pointer;}
    .gimg img{width:100%;display:block;}
    .gimg .src{position:absolute;top:6px;right:6px;font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;background:var(--green);color:var(--cream);padding:2px 6px;border-radius:2px;}
    .gimg .dim{position:absolute;bottom:6px;right:6px;font-family:var(--mono);font-size:9px;background:rgba(26,22,20,.72);color:var(--cream);padding:2px 6px;border-radius:2px;}

    .lb{position:fixed;inset:0;background:rgba(20,16,14,.93);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:120;padding:24px;}
    .lb.open{display:flex;}
    .lb img{max-width:92vw;max-height:76vh;border:2px solid var(--cream);box-shadow:0 18px 60px rgba(0,0,0,.6);}
    .lb .bar{display:flex;gap:12px;margin-top:16px;align-items:center;flex-wrap:wrap;justify-content:center;}
    .lb a,.lb button{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 18px;border-radius:2px;cursor:pointer;text-decoration:none;border:1.5px solid var(--cream);}
    .lb .dl{background:var(--brass);color:var(--ink);border-color:var(--brass);}
    .lb .open2{background:transparent;color:var(--cream);}
    .lb .close{background:var(--vermillion);color:var(--cream);border-color:var(--vermillion);}
    .hidden{display:none!important;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" id="back">← Back</a>
      <span class="brand">TBSI · Person · Localhost</span>
    </div>
    <div class="status" id="status">Loading…</div>
    <div id="body" class="hidden"></div>
  </div>

  <div class="lb" id="lb">
    <img id="lbImg" alt="" />
    <div class="bar">
      <a class="dl" id="lbDownload" href="#">Download full-res</a>
      <a class="open2" id="lbOpen" href="#" target="_blank" rel="noopener">Open original ↗</a>
      <button class="close" id="lbClose">Close ✕</button>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    const statusEl = $("#status");
    function setStatus(m, err){ statusEl.textContent = m||""; statusEl.classList.toggle("err", !!err); statusEl.classList.toggle("hidden", !m); }
    const id = new URLSearchParams(location.search).get("id");
    $("#back").addEventListener("click", () => history.length > 1 ? history.back() : (location.href = "/"));

    async function getJson(url){ const r = await fetch(url); const d = await r.json().catch(()=>({error:"bad JSON"})); if(!r.ok) throw new Error(d.error||("HTTP "+r.status)); return d; }

    let IMAGES = [];
    (async function init(){
      if (!id) { setStatus("No person id in URL.", true); return; }
      try {
        const p = await getJson("/api/person/" + encodeURIComponent(id));
        document.title = "TBSI · " + p.name;
        render(p);
        setStatus("");
      } catch (e) { setStatus("Failed to load: " + e.message, true); }
    })();

    function render(p){
      IMAGES = p.images || [];
      const pic = p.profileUrl ? `<img class="ppic" src="${esc(p.profileUrl)}" alt="" />` : `<div class="ppic" style="aspect-ratio:2/3"></div>`;

      const meta = [];
      if (p.knownForDepartment) meta.push(`Known for <b>${esc(p.knownForDepartment)}</b>`);
      if (p.birthday) meta.push(`Born ${esc(p.birthday)}${p.age!=null && !p.ageAtDeath ? ` · age <b>${p.age}</b>` : ""}`);
      if (p.placeOfBirth) meta.push(esc(p.placeOfBirth));
      if (p.deathday) meta.push(`Died ${esc(p.deathday)}${p.age!=null && p.ageAtDeath ? ` · age at death <b>${p.age}</b>` : ""}`);
      if (p.gender) meta.push(esc(p.gender));
      if (p.alsoKnownAs && p.alsoKnownAs.length) meta.push(`a.k.a. ${esc(p.alsoKnownAs.slice(0,4).join(", "))}`);

      const ids = [`<a class="link" href="https://www.themoviedb.org/person/${p.id}" target="_blank" rel="noopener">TMDb ${p.id} ↗</a>`];
      if (p.imdbId) ids.push(`<a class="link" href="https://www.imdb.com/name/${esc(p.imdbId)}" target="_blank" rel="noopener">${esc(p.imdbId)} ↗</a>`);
      if (p.homepage) ids.push(`<a class="link" href="${esc(p.homepage)}" target="_blank" rel="noopener">Homepage ↗</a>`);

      const filmo = p.filmography || [];
      const filmoHtml = filmo.length ? filmo.map(f=>{
        const clickable = f.mediaType === "movie";
        const poster = f.posterUrl ? `<span class="fp" style="background-image:url('${esc(f.posterUrl)}')"></span>` : `<span class="fp empty">no poster</span>`;
        const inner = `${poster}<div class="fm"><div class="ft">${esc(f.title)}</div><div class="fr">${esc(f.year||"—")} · ${esc(f.role)}</div><span class="fbadge">${esc(f.mediaType)}</span></div>`;
        return clickable
          ? `<a class="film clickable" href="/movie.html?id=${f.id}">${inner}</a>`
          : `<div class="film">${inner}</div>`;
      }).join("") : `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No filmography available.</div>`;

      const gallery = IMAGES.length
        ? IMAGES.map((im,i)=>`<div class="gimg" data-i="${i}"><img loading="lazy" src="${esc(im.thumbUrl)}" alt=""/><span class="src">${esc(im.source)}</span>${im.width?`<span class="dim">${im.width}×${im.height}</span>`:""}</div>`).join("")
        : `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No images available.</div>`;

      $("#body").innerHTML = `
        <div class="phead">
          <div>${pic}</div>
          <div>
            <h1>${esc(p.name)}</h1>
            <div class="pmeta">${meta.join("<br>")}</div>
            <div class="idrow">${ids.join("")}</div>
            ${p.biography?`<div class="bio">${esc(p.biography)}</div>`:""}
          </div>
        </div>

        <div class="seclabel"><span>Filmography</span><span class="count">${filmo.length} title${filmo.length===1?"":"s"}</span></div>
        <div class="filmo">${filmoHtml}</div>

        <div class="seclabel"><span>Image Gallery</span><span class="count">${IMAGES.length} image${IMAGES.length===1?"":"s"}${(p.imageSources||[]).length?"  ·  "+p.imageSources.join(", "):""}</span></div>
        <div class="grid">${gallery}</div>`;
      $("#body").classList.remove("hidden");
      $("#body").querySelectorAll(".gimg").forEach(el=> el.addEventListener("click", ()=> openLb(IMAGES[Number(el.dataset.i)])));
    }

    function openLb(im){
      $("#lbImg").src = im.fullUrl; $("#lbOpen").href = im.fullUrl;
      $("#lbDownload").href = "/api/download?url=" + encodeURIComponent(im.fullUrl);
      $("#lb").classList.add("open");
    }
    function closeLb(){ $("#lb").classList.remove("open"); $("#lbImg").src=""; }
    $("#lbClose").addEventListener("click", closeLb);
    $("#lb").addEventListener("click", e=>{ if(e.target===$("#lb")) closeLb(); });
    document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeLb(); });
  </script>
</body>
</html>
