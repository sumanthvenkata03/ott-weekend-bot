<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>TBSI · Person</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1A1614" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TBSI Lookup" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:#1A1614; --cream:#F4ECDC; --vermillion:#A33223; --brass:#C49A3F;
      --green:#2E5742; --oxblood:#682D25; --maroon:#581F16; --paper:#F4ECDC;
      --line:rgba(26,22,20,0.28); --ink-soft:rgba(26,22,20,0.66);
      --serif:"Playfair Display",Georgia,serif; --sans:"Inter",system-ui,sans-serif;
      --mono:"JetBrains Mono",ui-monospace,Consolas,monospace;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;
      background-image:radial-gradient(rgba(104,45,37,0.04) 1px,transparent 1px);background-size:4px 4px;}
    .wrap{max-width:1120px;margin:0 auto;padding:22px 22px 90px;}
    a{color:var(--vermillion);}
    .topbar{display:flex;justify-content:space-between;align-items:center;border-bottom:3px double var(--ink);padding-bottom:10px;}
    .back{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:var(--oxblood);cursor:pointer;}
    .back:hover{color:var(--vermillion);}
    .brand{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);}
    .status{text-align:center;font-family:var(--mono);font-size:12px;color:var(--ink-soft);min-height:18px;margin:18px 0;}
    .status.err{color:var(--vermillion);font-weight:700;}

    .seclabel{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--oxblood);margin:34px 0 14px;border-bottom:1px solid var(--line);padding-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;}
    .seclabel .count{color:var(--ink-soft);font-weight:500;}

    .phead{display:grid;grid-template-columns:220px 1fr;gap:28px;margin-top:18px;}
    @media (max-width:640px){.phead{grid-template-columns:1fr;}}
    .ppic{width:100%;border:1px solid var(--ink);border-radius:2px;background:#e6dcc6;display:block;}
    .phead h1{font-family:var(--serif);font-weight:900;font-size:clamp(28px,5vw,44px);line-height:1.02;margin:0 0 6px;}
    .pmeta{font-family:var(--mono);font-size:12px;color:var(--ink);line-height:1.9;}
    .pmeta b{color:var(--vermillion);}
    .bio{font-family:var(--serif);font-size:16px;line-height:1.6;margin-top:14px;}
    .idrow{margin-top:12px;display:flex;gap:16px;flex-wrap:wrap;}
    a.link{color:var(--vermillion);text-decoration:none;border-bottom:1px solid rgba(163,50,35,.4);font-family:var(--mono);font-size:12px;}
    .savebtn{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px 15px;border-radius:2px;cursor:pointer;border:1.5px solid var(--brass);background:transparent;color:var(--oxblood);margin-top:12px;}
    .savebtn.on{background:var(--brass);color:var(--ink);}
    .savebtn:disabled{opacity:.6;cursor:default;}
    .fcontrols{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 12px;}
    .fbtn{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 11px;border:1px solid var(--line);background:#fbf6ea;border-radius:2px;cursor:pointer;color:var(--ink);}
    .fbtn.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
    .fsort{font-family:var(--mono);font-size:11px;padding:6px 8px;border:1px solid var(--line);background:#fbf6ea;border-radius:2px;color:var(--ink);cursor:pointer;}
    .fsep{flex:1 1 8px;min-width:8px;}

    .filmo{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;}
    .film{border:1px solid var(--line);background:#fbf6ea;border-radius:2px;overflow:hidden;text-decoration:none;color:inherit;display:block;transition:transform .08s,border-color .08s;}
    .film.clickable{cursor:pointer;} .film.clickable:hover{transform:translateY(-2px);border-color:var(--vermillion);}
    .film .fp{aspect-ratio:2/3;background:#e6dcc6 center/cover no-repeat;display:flex;align-items:center;justify-content:center;}
    .film .fp.empty{font-family:var(--mono);font-size:9px;color:var(--ink-soft);text-align:center;padding:6px;}
    .film .fm{padding:7px 8px 9px;}
    .film .ft{font-family:var(--serif);font-weight:700;font-size:13px;line-height:1.15;}
    .film .fr{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-top:3px;}
    .film .fbadge{display:inline-block;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cream);background:var(--brass);padding:1px 4px;border-radius:2px;margin-top:4px;}

    .tabs{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap;}
    .tab{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--ink);background:#fbf6ea;cursor:pointer;border-radius:2px;}
    .tab.active{background:var(--ink);color:var(--cream);}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
    .gimg{position:relative;border:1px solid var(--line);border-radius:2px;overflow:hidden;background:#e6dcc6;cursor:pointer;}
    .gimg img{width:100%;display:block;}
    .gimg .src{position:absolute;top:6px;right:6px;font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;background:var(--green);color:var(--cream);padding:2px 6px;border-radius:2px;}
    .gimg .src.still{background:var(--oxblood);}
    .gimg .ctx{position:absolute;top:6px;left:6px;right:34px;font-family:var(--mono);font-size:9px;font-weight:700;background:rgba(26,22,20,.82);color:var(--cream);padding:2px 6px;border-radius:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .gimg .dim{position:absolute;bottom:6px;right:6px;font-family:var(--mono);font-size:9px;background:rgba(26,22,20,.72);color:var(--cream);padding:2px 6px;border-radius:2px;}

    /* loading indicators (skeleton + cold-start banner) */
    .spinner{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--vermillion);border-radius:50%;animation:spin .7s linear infinite;flex:0 0 auto;box-sizing:border-box;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--ink-soft);padding:14px 2px;}
    .loading.err{color:var(--vermillion);}
    .skelcard{aspect-ratio:2/3;border-radius:2px;background:linear-gradient(100deg,#e6dcc6 30%,#f1e9d8 50%,#e6dcc6 70%);background-size:200% 100%;animation:shimmer 1.2s ease-in-out infinite;}
    @keyframes shimmer{to{background-position:-200% 0;}}
    .wakebanner{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);display:flex;align-items:center;gap:10px;background:var(--ink);color:var(--cream);font-family:var(--mono);font-size:12px;letter-spacing:.03em;padding:11px 16px;border-radius:2px;border:1px solid var(--brass);box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:200;}
    .wakebanner.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .wakebanner::before{content:"";width:14px;height:14px;border:2px solid rgba(244,236,220,.35);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;box-sizing:border-box;}

    .lb{position:fixed;inset:0;background:rgba(20,16,14,.93);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:120;padding:24px;}
    .lb.open{display:flex;}
    .lb img{max-width:92vw;max-height:76vh;border:2px solid var(--cream);box-shadow:0 18px 60px rgba(0,0,0,.6);}
    .lb .bar{display:flex;gap:12px;margin-top:16px;align-items:center;flex-wrap:wrap;justify-content:center;}
    .lb a,.lb button{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 18px;border-radius:2px;cursor:pointer;text-decoration:none;border:1.5px solid var(--cream);}
    .lb .dl{background:var(--brass);color:var(--ink);border-color:var(--brass);}
    .lb .open2{background:transparent;color:var(--cream);}
    .lb .close{background:var(--vermillion);color:var(--cream);border-color:var(--vermillion);}
    .lb .counter{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--cream);opacity:.85;padding:9px 6px;}
    .lb .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:2;width:52px;height:74px;display:flex;align-items:center;justify-content:center;padding:0;font-family:var(--serif);font-size:36px;line-height:1;font-weight:700;background:rgba(20,16,14,.5);color:var(--cream);border:1.5px solid var(--cream);border-radius:2px;cursor:pointer;transition:background .1s,border-color .1s;}
    .lb .nav:hover{background:var(--vermillion);border-color:var(--vermillion);}
    .lb .nav.prev{left:18px;} .lb .nav.next{right:18px;}
    @media (max-width:640px){.lb .nav{width:42px;height:60px;font-size:28px;left:6px;} .lb .nav.next{right:6px;}}

    /* ── Mobile (phones) ── phead already stacks at 640; this tightens spacing,
       caps the stacked photo, enlarges tap targets, and fits the lightbox. */
    @media (max-width:520px){
      .wrap{padding:16px 14px 60px;}
      .brand{font-size:9px;letter-spacing:.18em;}
      .phead{gap:16px;}
      .ppic{max-width:190px;}
      .phead h1{font-size:clamp(26px,8vw,40px);}
      .seclabel{margin:26px 0 12px;}
      .tab{padding:9px 14px;}          /* ~40px tappable */
      .filmo{gap:10px;}
      .grid{gap:10px;}
      .lb{padding:14px;}
      .lb img{max-width:94vw;max-height:64vh;}
      .lb .bar{gap:8px;margin-top:12px;}
      .lb a,.lb button{font-size:11px;padding:8px 12px;letter-spacing:.06em;}
    }
    .hidden{display:none!important;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" id="back">← Back</a>
      <span class="brand">TBSI · Person · Localhost</span>
    </div>
    <div class="status" id="status">Loading…</div>
    <div id="body" class="hidden"></div>
  </div>

  <div class="lb" id="lb">
    <button class="nav prev" id="lbPrev" aria-label="Previous image">‹</button>
    <img id="lbImg" alt="" />
    <button class="nav next" id="lbNext" aria-label="Next image">›</button>
    <div class="bar">
      <span class="counter" id="lbCounter"></span>
      <a class="dl" id="lbDownload" href="#">Download full-res</a>
      <a class="open2" id="lbOpen" href="#" target="_blank" rel="noopener">Open original ↗</a>
      <button class="close" id="lbClose">Close ✕</button>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    const statusEl = $("#status");
    function setStatus(m, err){ statusEl.textContent = m||""; statusEl.classList.toggle("err", !!err); statusEl.classList.toggle("hidden", !m); }
    const id = new URLSearchParams(location.search).get("id");
    $("#back").addEventListener("click", () => history.length > 1 ? history.back() : (location.href = "/"));

    async function getJson(url){ const r = await fetch(url); const d = await r.json().catch(()=>({error:"bad JSON"})); if(!r.ok) throw new Error(d.error||("HTTP "+r.status)); return d; }

    // ── Cold-start "waking up" banner: shown while a tracked fetch runs >3s. ──
    let _pending = 0, _wakeTimer = null, _wakeEl = null;
    function wakeShow(){ if(!_wakeEl){ _wakeEl=document.createElement("div"); _wakeEl.className="wakebanner"; _wakeEl.textContent="Server waking up, one moment…"; document.body.appendChild(_wakeEl); } requestAnimationFrame(()=>_wakeEl.classList.add("show")); }
    function wakeHide(){ if(_wakeEl) _wakeEl.classList.remove("show"); }
    async function trackedFetch(url){
      _pending++;
      if(!_wakeTimer) _wakeTimer=setTimeout(wakeShow, 3000);
      try { return await getJson(url); }
      finally { if(--_pending<=0){ clearTimeout(_wakeTimer); _wakeTimer=null; wakeHide(); } }
    }

    // Skeleton shown while the (single) person request is in flight — profile +
    // filmography + gallery all arrive together, so one loading state covers them.
    function showLoading(){
      $("#body").innerHTML = `
        <div class="phead">
          <div><div class="ppic skelcard"></div></div>
          <div><div class="loading"><span class="spinner"></span>Loading profile, filmography &amp; gallery…</div></div>
        </div>
        <div class="seclabel"><span>Image Gallery</span></div>
        <div class="grid">${Array.from({length:8},()=>'<div class="skelcard"></div>').join("")}</div>`;
      $("#body").classList.remove("hidden");
    }

    let IMAGES = [];
    (async function init(){
      if (!id) { setStatus("No person id in URL.", true); return; }
      showLoading();
      try {
        const p = await trackedFetch("/api/person/" + encodeURIComponent(id));
        document.title = "TBSI · " + p.name;
        render(p);
        setStatus("");
      } catch (e) { $("#body").classList.add("hidden"); setStatus("Failed to load: " + e.message, true); }
    })();

    function render(p){
      IMAGES = p.images || [];
      const pic = p.profileUrl ? `<img class="ppic" src="${esc(p.profileUrl)}" alt="" />` : `<div class="ppic" style="aspect-ratio:2/3"></div>`;

      const meta = [];
      if (p.knownForDepartment) meta.push(`Known for <b>${esc(p.knownForDepartment)}</b>`);
      if (p.birthday) meta.push(`Born ${esc(p.birthday)}${p.age!=null && !p.ageAtDeath ? ` · age <b>${p.age}</b>` : ""}`);
      if (p.placeOfBirth) meta.push(esc(p.placeOfBirth));
      if (p.deathday) meta.push(`Died ${esc(p.deathday)}${p.age!=null && p.ageAtDeath ? ` · age at death <b>${p.age}</b>` : ""}`);
      if (p.gender) meta.push(esc(p.gender));
      if (p.alsoKnownAs && p.alsoKnownAs.length) meta.push(`a.k.a. ${esc(p.alsoKnownAs.slice(0,4).join(", "))}`);

      const ids = [`<a class="link" href="https://www.themoviedb.org/person/${p.id}" target="_blank" rel="noopener">TMDb ${p.id} ↗</a>`];
      if (p.imdbId) ids.push(`<a class="link" href="https://www.imdb.com/name/${esc(p.imdbId)}" target="_blank" rel="noopener">${esc(p.imdbId)} ↗</a>`);
      if (p.homepage) ids.push(`<a class="link" href="${esc(p.homepage)}" target="_blank" rel="noopener">Homepage ↗</a>`);

      FILMO = p.filmography || [];

      $("#body").innerHTML = `
        <div class="phead">
          <div>${pic}</div>
          <div>
            <h1>${esc(p.name)}</h1>
            <div class="pmeta">${meta.join("<br>")}</div>
            <div class="idrow">${ids.join("")}</div>
            <button class="savebtn" id="saveBtn">☆ Save</button>
            ${p.biography?`<div class="bio">${esc(p.biography)}</div>`:""}
          </div>
        </div>

        <div class="seclabel"><span>Filmography</span><span class="count" id="filmoCount"></span></div>
        <div class="fcontrols">
          <div class="fgroup" id="filmoFilters">
            <button class="fbtn active" data-f="all">All</button>
            <button class="fbtn" data-f="acting">Acting</button>
            <button class="fbtn" data-f="directing">Directing</button>
            <button class="fbtn" data-f="crew">Crew</button>
          </div>
          <span class="fsep"></span>
          <select class="fsort" id="filmoSort">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="popular">Most popular</option>
          </select>
        </div>
        <div class="filmo" id="filmoGrid"></div>

        <div class="seclabel"><span>Image Gallery</span><span class="count" id="galCount"></span></div>
        <div class="tabs" id="galTabs">
          <div class="tab active" data-f="all">All</div>
          <div class="tab" data-f="portrait">Portraits</div>
          <div class="tab" data-f="still">Film stills</div>
        </div>
        <div class="grid" id="galGrid"></div>`;
      $("#body").classList.remove("hidden");
      setupGallery(p);
      wireFilmo();
      initSave(p);
    }

    // ── Filmography sort + filter (client-side; mirror of compute.ts) ──
    let FILMO = [], F_SORT = "newest", F_FILTER = "all";
    function sortFilmography(items, sort){
      const c = items.slice();
      if (sort === "newest") c.sort((a,b)=>(b.year||0)-(a.year||0));
      else if (sort === "oldest") c.sort((a,b)=>(a.year||Infinity)-(b.year||Infinity));
      else if (sort === "popular") c.sort((a,b)=>(b.popularity||0)-(a.popularity||0));
      return c;
    }
    function filterFilmography(items, filter){
      if (filter === "all") return items.slice();
      if (filter === "acting") return items.filter(f=>f.department==="cast");
      if (filter === "crew") return items.filter(f=>f.department==="crew");
      return items.filter(f=>f.department==="crew" && /direct/i.test(f.role||""));
    }
    function renderFilmo(){
      const list = sortFilmography(filterFilmography(FILMO, F_FILTER), F_SORT);
      $("#filmoCount").textContent = list.length + " of " + FILMO.length + " title" + (FILMO.length===1?"":"s");
      $("#filmoGrid").innerHTML = list.length ? list.map(f=>{
        const clickable = f.mediaType === "movie";
        const poster = f.posterUrl ? `<span class="fp" style="background-image:url('${esc(f.posterUrl)}')"></span>` : `<span class="fp empty">no poster</span>`;
        const inner = `${poster}<div class="fm"><div class="ft">${esc(f.title)}</div><div class="fr">${esc(f.year||"—")} · ${esc(f.role)}</div><span class="fbadge">${esc(f.mediaType)}</span></div>`;
        return clickable ? `<a class="film clickable" href="/movie.html?id=${f.id}">${inner}</a>` : `<div class="film">${inner}</div>`;
      }).join("") : `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No titles in this view.</div>`;
    }
    function wireFilmo(){
      $("#filmoFilters").querySelectorAll(".fbtn").forEach(b=> b.addEventListener("click", ()=>{
        F_FILTER = b.dataset.f;
        $("#filmoFilters").querySelectorAll(".fbtn").forEach(x=>x.classList.toggle("active", x===b));
        renderFilmo();
      }));
      $("#filmoSort").addEventListener("change", (e)=>{ F_SORT = e.target.value; renderFilmo(); });
      renderFilmo();
    }

    // ── Watchlist "☆ Save / ★ Saved" toggle ──
    async function initSave(p){
      const btn = $("#saveBtn"); if(!btn) return;
      let saved = false;
      try { const w = await getJson("/api/watchlist"); saved = (w.items||[]).some(i=>i.type==="person" && String(i.tmdbId)===String(p.id)); } catch(e){ /* best-effort */ }
      const paint = ()=>{ btn.textContent = saved ? "★ Saved" : "☆ Save"; btn.classList.toggle("on", saved); };
      paint();
      btn.addEventListener("click", async ()=>{
        btn.disabled = true;
        try {
          if (saved){ await fetch(`/api/watchlist/person/${p.id}`, { method:"DELETE" }); saved = false; }
          else { await fetch("/api/watchlist", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ type:"person", id:p.id, title:p.name }) }); saved = true; }
          paint();
        } catch(e){ } finally { btn.disabled = false; }
      });
    }

    let GALFILTER = "all";
    function setupGallery(p){
      const st = p.imageStats || { portraits: 0, stills: 0, stillFilms: 0 };
      // hide empty tabs
      $("#galTabs").querySelector('[data-f="portrait"]').style.display = st.portraits ? "" : "none";
      $("#galTabs").querySelector('[data-f="still"]').style.display = st.stills ? "" : "none";
      $("#galTabs").querySelectorAll(".tab").forEach(t=> t.addEventListener("click", ()=>{
        GALFILTER = t.dataset.f;
        $("#galTabs").querySelectorAll(".tab").forEach(x=>x.classList.toggle("active", x===t));
        renderGallery(p);
      }));
      renderGallery(p);
    }
    function renderGallery(p){
      const st = p.imageStats || { portraits: 0, stills: 0, stillFilms: 0 };
      const picks = IMAGES.map((im,i)=>({im,i})).filter(({im})=>
        GALFILTER==="all" ? true : GALFILTER==="still" ? im.kind==="still" : im.kind!=="still");
      $("#galCount").textContent =
        `${IMAGES.length} total · ${st.portraits} portraits · ${st.stills} film stills` +
        (st.stillFilms?` (from ${st.stillFilms} films)`:"") +
        ((p.imageSources||[]).length?`  ·  ${p.imageSources.join(", ")}`:"");
      const grid = $("#galGrid");
      grid.innerHTML = picks.length
        ? picks.map(({im,i})=>`<div class="gimg" data-i="${i}">
            <img loading="lazy" src="${esc(im.thumbUrl)}" alt=""/>
            <span class="src ${im.kind==='still'?'still':''}">${esc(im.source)}</span>
            ${im.kind==='still'&&im.context?`<span class="ctx">still · ${esc(im.context)}</span>`:""}
            ${im.width?`<span class="dim">${im.width}×${im.height}</span>`:""}
          </div>`).join("")
        : `<div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No images in this view.</div>`;
      // The lightbox slideshow cycles the CURRENTLY VISIBLE (filtered) set, in
      // grid order — so arrows stay within the active tab (All / Portraits /
      // Film stills). Open by grid position within this filtered view.
      LB_LIST = picks.map(x=>x.im);
      grid.querySelectorAll(".gimg").forEach((el,pos)=> el.addEventListener("click", ()=> openLbAt(LB_LIST, pos)));
    }

    // ── Lightbox slideshow (prev/next over the active tab's filtered set) ──
    // Wrap-around: after the last image Next goes to the first, and Prev from
    // the first goes to the last.
    let LB_LIST = [], LB_INDEX = 0;
    function openLbAt(list, i){
      if (!list || !list.length) return;
      LB_LIST = list;
      LB_INDEX = ((i % list.length) + list.length) % list.length;
      showLb();
      $("#lb").classList.add("open");
    }
    function showLb(){
      const im = LB_LIST[LB_INDEX]; if (!im) return;
      $("#lbImg").src = im.fullUrl; $("#lbOpen").href = im.fullUrl;
      $("#lbDownload").href = "/api/download?url=" + encodeURIComponent(im.fullUrl);
      const multi = LB_LIST.length > 1;
      $("#lbCounter").textContent = multi ? (LB_INDEX + 1) + " / " + LB_LIST.length : "";
      $("#lbPrev").classList.toggle("hidden", !multi);
      $("#lbNext").classList.toggle("hidden", !multi);
      preloadNext();
    }
    function navLb(dir){
      if (LB_LIST.length < 2) return;
      LB_INDEX = (LB_INDEX + dir + LB_LIST.length) % LB_LIST.length;
      showLb();
    }
    function preloadNext(){
      if (LB_LIST.length < 2) return;
      const n = LB_LIST[(LB_INDEX + 1) % LB_LIST.length];
      if (n && n.fullUrl){ const img = new Image(); img.src = n.fullUrl; }
    }
    function closeLb(){ $("#lb").classList.remove("open"); $("#lbImg").src=""; }
    $("#lbClose").addEventListener("click", closeLb);
    $("#lbPrev").addEventListener("click", e=>{ e.stopPropagation(); navLb(-1); });
    $("#lbNext").addEventListener("click", e=>{ e.stopPropagation(); navLb(1); });
    $("#lb").addEventListener("click", e=>{ if(e.target===$("#lb")) closeLb(); });
    document.addEventListener("keydown", e=>{
      if (!$("#lb").classList.contains("open")) return;
      if (e.key === "Escape") closeLb();
      else if (e.key === "ArrowLeft"){ e.preventDefault(); navLb(-1); }
      else if (e.key === "ArrowRight"){ e.preventDefault(); navLb(1); }
    });
    // Touch swipe: left-swipe = Next, right-swipe = Prev.
    let lbTsX = 0, lbTsY = 0;
    $("#lb").addEventListener("touchstart", e=>{ if(e.touches.length===1){ lbTsX=e.touches[0].clientX; lbTsY=e.touches[0].clientY; } }, {passive:true});
    $("#lb").addEventListener("touchend", e=>{
      const t = e.changedTouches[0]; if(!t) return;
      const dx = t.clientX - lbTsX, dy = t.clientY - lbTsY;
      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) navLb(dx < 0 ? 1 : -1);
    }, {passive:true});
  </script>
  <script>
    // PWA: register the app-shell service worker (installable + offline shell).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
