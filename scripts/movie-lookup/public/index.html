<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>TBSI · Movie Lookup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:#1A1614; --cream:#F4ECDC; --vermillion:#A33223; --brass:#C49A3F;
      --green:#2E5742; --oxblood:#682D25; --maroon:#581F16; --paper:#F4ECDC;
      --line:rgba(26,22,20,0.28); --ink-soft:rgba(26,22,20,0.66);
      --serif:"Playfair Display",Georgia,serif; --sans:"Inter",system-ui,sans-serif;
      --mono:"JetBrains Mono",ui-monospace,Consolas,monospace;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;
      background-image:radial-gradient(rgba(104,45,37,0.04) 1px,transparent 1px);background-size:4px 4px;}
    .wrap{max-width:1100px;margin:0 auto;padding:28px 22px 80px;}
    .masthead{text-align:center;border-bottom:3px double var(--ink);padding-bottom:14px;}
    .masthead .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--oxblood);font-weight:700;}
    .masthead h1{font-family:var(--serif);font-weight:900;font-size:clamp(30px,6vw,54px);margin:6px 0 4px;line-height:1;}
    .masthead .sub{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);}
    .rule-row{display:flex;align-items:center;gap:10px;margin:10px 0 0;}
    .rule-row::before,.rule-row::after{content:"";flex:1;height:1px;background:var(--line);}
    .rule-row span{font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--vermillion);}

    .searchzone{max-width:640px;margin:26px auto 8px;position:relative;}
    .search{display:flex;gap:10px;}
    .search input{flex:1;font-family:var(--serif);font-size:20px;color:var(--ink);background:#fbf6ea;border:1.5px solid var(--ink);border-radius:2px;padding:12px 16px;outline:none;}
    .search input:focus{border-color:var(--vermillion);box-shadow:0 0 0 3px rgba(163,50,35,.14);}
    .search button{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream);background:var(--vermillion);border:1.5px solid var(--maroon);border-radius:2px;padding:0 22px;cursor:pointer;}
    .search button:hover{background:var(--oxblood);}
    .hint{font-family:var(--mono);font-size:10px;color:var(--ink-soft);text-align:center;margin-top:6px;letter-spacing:.02em;}

    /* auto-suggest dropdown */
    .suggest{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--paper);border:1.5px solid var(--ink);border-radius:2px;box-shadow:0 16px 40px rgba(26,22,20,.28);z-index:40;overflow:hidden;display:none;}
    .suggest.open{display:block;}
    .sitem{display:flex;gap:10px;align-items:center;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--line);text-decoration:none;color:inherit;}
    .sitem:last-child{border-bottom:none;}
    .sitem.active,.sitem:hover{background:#fbf6ea;}
    .sitem .st{flex:0 0 38px;height:57px;background:#e6dcc6 center/cover no-repeat;border:1px solid var(--line);border-radius:2px;}
    .sitem .st.empty{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:7px;color:var(--ink-soft);text-align:center;}
    .sitem .sinfo{min-width:0;flex:1;}
    .sitem .stitle{font-family:var(--serif);font-weight:700;font-size:15px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sitem .smeta{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-top:2px;}
    .sitem .sbadge{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cream);background:var(--green);padding:1px 5px;border-radius:2px;}
    .sitem .sbadge.tv{background:var(--brass);color:var(--ink);}
    .sitem .sbadge.person{background:var(--vermillion);}
    .sitem .sbadge.company{background:var(--oxblood);}
    .sfoot{font-family:var(--mono);font-size:9px;color:var(--ink-soft);text-align:center;padding:5px;letter-spacing:.06em;text-transform:uppercase;background:#fbf6ea;}

    .status{text-align:center;font-family:var(--mono);font-size:12px;color:var(--ink-soft);min-height:18px;margin:4px 0 0;}
    .status.err{color:var(--vermillion);font-weight:700;}
    .seclabel{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--oxblood);margin:30px 0 12px;border-bottom:1px solid var(--line);padding-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;}
    .seclabel .count{color:var(--ink-soft);font-weight:500;}
    .cands{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;}
    .cand{cursor:pointer;border:1px solid var(--line);background:#fbf6ea;border-radius:2px;overflow:hidden;transition:transform .08s,border-color .08s;text-decoration:none;color:inherit;display:block;}
    .cand:hover{transform:translateY(-2px);border-color:var(--vermillion);}
    .cand .thumb{aspect-ratio:2/3;background:#e6dcc6 center/cover no-repeat;display:block;}
    .cand .thumb.empty{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--ink-soft);text-align:center;padding:8px;}
    .cand .meta{padding:8px 9px 10px;}
    .cand .t{font-family:var(--serif);font-weight:700;font-size:14px;line-height:1.15;}
    .cand .m{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-top:3px;}
    .cand .badge{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cream);background:var(--green);padding:1px 5px;border-radius:2px;margin-top:4px;}
    .cand .badge.tv{background:var(--brass);color:var(--ink);}
    .cand .badge.person{background:var(--vermillion);}
    .cand .badge.company{background:var(--oxblood);}
    .hidden{display:none!important;}
    footer{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);margin-top:50px;border-top:1px solid var(--line);padding-top:14px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="masthead">
      <div class="kicker">Internal Reference · Localhost Only</div>
      <h1>The Big Screen Index</h1>
      <div class="sub">Movie Lookup &amp; Poster Gallery</div>
      <div class="rule-row"><span>Est. MMXXVI</span></div>
    </div>

    <div class="searchzone">
      <form class="search" id="searchForm" autocomplete="off">
        <input id="q" type="text" placeholder="Type a film name…  e.g.  telugu boss" autocomplete="off" autofocus />
        <button type="submit">Search</button>
      </form>
      <div class="hint">Type any words, any order · language/year help ranking · ↑↓ to navigate · Enter for full results</div>
      <div class="suggest" id="suggest"></div>
    </div>
    <div class="status" id="status"></div>

    <div id="candsWrap" class="hidden">
      <div class="seclabel"><span>Matches — click to open detail</span><span class="count" id="candCount"></span></div>
      <div class="cands" id="cands"></div>
    </div>

    <footer>TBSI · The Big Screen Index — not for publication</footer>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const statusEl = $("#status"), qEl = $("#q"), sug = $("#suggest");
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    function setStatus(m, err){ statusEl.textContent = m||""; statusEl.classList.toggle("err", !!err); }

    // ── In-memory cache + stale-request guard (newest query wins) ──
    const cache = new Map();          // query -> candidates[]
    let seq = 0;                      // request sequence
    let inflight = null;              // AbortController for the live suggest fetch
    const SUGGEST_LIMIT = 8;

    async function fetchRanked(q, limit){
      const key = q + "|" + limit;
      if (cache.has(key)) return cache.get(key);
      if (inflight) inflight.abort();
      inflight = new AbortController();
      const r = await fetch("/api/search?q=" + encodeURIComponent(q) + "&limit=" + limit, { signal: inflight.signal });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "HTTP " + r.status);
      cache.set(key, data);
      if (cache.size > 60) cache.delete(cache.keys().next().value); // bound cache
      return data;
    }

    // ── Auto-suggest (debounced) ──
    let debounceT = null, activeIdx = -1, curSug = [];
    qEl.addEventListener("input", () => {
      const q = qEl.value.trim();
      clearTimeout(debounceT);
      if (q.length < 2) { closeSuggest(); return; }
      debounceT = setTimeout(() => runSuggest(q), 280);
    });

    async function runSuggest(q){
      const mySeq = ++seq;
      try {
        const data = await fetchRanked(q, SUGGEST_LIMIT);
        if (mySeq !== seq) return;                 // a newer keystroke already fired — ignore stale
        renderSuggest(data.candidates || []);
      } catch (e) {
        if (e.name === "AbortError") return;        // superseded
        if (mySeq === seq) closeSuggest();
      }
    }

    // ── Type-aware helpers (person / movie / series / company) ──
    const TYPE_LABEL = { person:"person", movie:"film", series:"series", company:"company" };
    const TYPE_CLS = { person:"person", movie:"", series:"tv", company:"company" };
    function isClickable(c){ return c.clickable !== false && (c.type === "person" || c.type === "movie"); }
    function typeHref(c){ return c.type==="person" ? `/person.html?id=${c.id}` : c.type==="movie" ? `/movie.html?id=${c.id}` : "javascript:void(0)"; }
    function typeSub(c){
      if (c.type==="person") return (c.knownForDepartment||"person") + (c.knownForTitle ? " · " + c.knownForTitle : "");
      if (c.type==="company") return c.originCountry ? "production company · " + c.originCountry : "production company";
      return (c.year||"—") + (c.language ? " · " + c.language : "");
    }
    function blockMsg(c){
      return c.type==="series" ? "Series detail isn’t supported (movie-only)."
           : c.type==="company" ? "Company rows are label-only for now." : "";
    }

    function renderSuggest(cands){
      curSug = cands; activeIdx = -1;
      if (!cands.length){ closeSuggest(); return; }
      sug.innerHTML = cands.map((c, i) => {
        const href = isClickable(c) ? typeHref(c) : "javascript:void(0)";
        const thumb = c.thumb ? `<span class="st" style="background-image:url('${esc(c.thumb)}')"></span>` : `<span class="st empty">no img</span>`;
        const badge = `<span class="sbadge ${TYPE_CLS[c.type]||""}">${TYPE_LABEL[c.type]||c.type}</span>`;
        return `<a class="sitem" data-i="${i}" data-type="${c.type}" data-id="${c.id}" href="${href}">
          ${thumb}
          <span class="sinfo">
            <span class="stitle">${esc(c.title)}</span>
            <span class="smeta">${esc(typeSub(c))} · score ${esc(c.score)}</span>
          </span>
          ${badge}
        </a>`;
      }).join("") + `<div class="sfoot">↵ open · ↑↓ navigate · Enter (empty) = full results</div>`;
      sug.classList.add("open");
      sug.querySelectorAll(".sitem").forEach((el,idx) => el.addEventListener("click", (e) => {
        if (!isClickable(cands[idx])){ e.preventDefault(); setStatus(blockMsg(cands[idx]), true); }
      }));
    }
    function closeSuggest(){ sug.classList.remove("open"); sug.innerHTML=""; curSug=[]; activeIdx=-1; }

    function highlight(idx){
      const items = sug.querySelectorAll(".sitem");
      items.forEach(el => el.classList.remove("active"));
      if (idx >= 0 && items[idx]){ items[idx].classList.add("active"); items[idx].scrollIntoView({block:"nearest"}); }
      activeIdx = idx;
    }

    qEl.addEventListener("keydown", (e) => {
      if (!sug.classList.contains("open")) return;
      if (e.key === "ArrowDown"){ e.preventDefault(); highlight(Math.min(activeIdx+1, curSug.length-1)); }
      else if (e.key === "ArrowUp"){ e.preventDefault(); highlight(Math.max(activeIdx-1, -1)); }
      else if (e.key === "Enter" && activeIdx >= 0){
        const c = curSug[activeIdx];
        if (c && isClickable(c)){ e.preventDefault(); location.href = typeHref(c); }
      } else if (e.key === "Escape"){ closeSuggest(); }
    });
    document.addEventListener("click", (e) => { if (!e.target.closest(".searchzone")) closeSuggest(); });

    // ── Full search on submit (Enter with no active suggestion) ──
    const params = new URLSearchParams(location.search);
    if (params.get("q")) { qEl.value = params.get("q"); doSearch(params.get("q")); }

    $("#searchForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const q = qEl.value.trim();
      if (!q) return;
      closeSuggest();
      history.replaceState(null, "", "/?q=" + encodeURIComponent(q));
      doSearch(q);
    });

    async function doSearch(q) {
      $("#candsWrap").classList.add("hidden");
      setStatus("Searching for “" + q + "” …");
      try {
        const data = await fetchRanked(q, 30);
        if (!data.candidates.length) { setStatus("No matches found.", true); return; }
        const p = data.parsed || {};
        const bits = [];
        if (p.titleTokens && p.titleTokens.length) bits.push("query: " + p.titleTokens.join(" "));
        if (p.typeBoosts && p.typeBoosts.length) bits.push("boost: " + p.typeBoosts.join(", "));
        if (p.roleDept) bits.push("role: " + p.roleDept);
        if (p.languages && p.languages.length) bits.push("language: " + p.languages.join(", "));
        if (p.year) bits.push("year: " + p.year);
        setStatus(data.count + " result" + (data.count === 1 ? "" : "s") + " (ranked)" + (bits.length ? "  ·  " + bits.join("  ·  ") : ""));
        render(data.candidates);
      } catch (err) { if (err.name !== "AbortError") setStatus("Search failed: " + err.message, true); }
    }

    function render(cands) {
      $("#candCount").textContent = cands.length + " result" + (cands.length === 1 ? "" : "s");
      $("#cands").innerHTML = cands.map((c, i) => {
        const thumb = c.thumb ? `<span class="thumb" style="background-image:url('${esc(c.thumb)}')"></span>` : `<span class="thumb empty">no image</span>`;
        const badge = `<span class="badge ${TYPE_CLS[c.type]||""}">${TYPE_LABEL[c.type]||c.type}</span>`;
        const href = isClickable(c) ? typeHref(c) : "javascript:void(0)";
        return `<a class="cand" href="${href}" data-i="${i}">
          ${thumb}
          <div class="meta">
            <div class="t">${esc(c.title)}</div>
            <div class="m">${esc(typeSub(c))}</div>
            <div class="m" style="color:var(--brass);font-weight:700">score ${esc(c.score)}${c.voteAverage ? " · ★" + c.voteAverage.toFixed(1) : ""}</div>
            ${badge}
          </div>
        </a>`;
      }).join("");
      $("#candsWrap").classList.remove("hidden");
      $("#cands").querySelectorAll(".cand").forEach((el) =>
        el.addEventListener("click", (e) => { const c = cands[Number(el.dataset.i)]; if (!isClickable(c)){ e.preventDefault(); setStatus(blockMsg(c), true); } }));
    }
  </script>
</body>
</html>
